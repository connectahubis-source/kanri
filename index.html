/**
 * 当日タイムライン (グリッド形式)。EVENTS が空なら EmptyState 表示。
 */
function PageSchedule(){
  const [events, setEvents] = useState([]);
  const [todos, setTodos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // 表示する月 (今月をデフォルト)
  const today = new Date();
  const [viewMonth, setViewMonth] = useState({y: today.getFullYear(), m: today.getMonth()});

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [evs, tds] = await Promise.all([
          window.fetchData('listEvents'),
          window.fetchData('listTodos'),
        ]);
        if (cancelled) return;
        setEvents(Array.isArray(evs) ? evs : []);
        setTodos(Array.isArray(tds) ? tds : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 月の日付を組み立てる
  function getMonthDays(y, m) {
    const firstDay = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0);
    const startDayOfWeek = firstDay.getDay();   // 0=日, 1=月...
    const daysInMonth = lastDay.getDate();

    // 先頭は前月の日を埋める
    const days = [];
    for (let i = 0; i < startDayOfWeek; i++) {
      const d = new Date(y, m, 1 - (startDayOfWeek - i));
      days.push({date: d, inMonth: false});
    }
    for (let i = 1; i <= daysInMonth; i++) {
      days.push({date: new Date(y, m, i), inMonth: true});
    }
    // 末尾は次月の日で 7×6=42 になるよう調整
    while (days.length < 42) {
      const last = days[days.length - 1].date;
      const next = new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1);
      days.push({date: next, inMonth: false});
    }
    return days;
  }

  function dateToStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  const days = getMonthDays(viewMonth.y, viewMonth.m);

  // 各日付に表示するイベント・Todo を集める
  function getItemsAt(dateStr) {
    const evs = events.filter(e => e.date === dateStr && e.status !== "アーカイブ");
    const tds = todos.filter(t => !t.done && t.deadline === dateStr);
    return {events: evs, todos: tds};
  }

  // 月切替
  function prevMonth() {
    setViewMonth(v => {
      const m = v.m - 1;
      return m < 0 ? {y: v.y - 1, m: 11} : {y: v.y, m};
    });
  }
  function nextMonth() {
    setViewMonth(v => {
      const m = v.m + 1;
      return m > 11 ? {y: v.y + 1, m: 0} : {y: v.y, m};
    });
  }
  function goToday() {
    setViewMonth({y: today.getFullYear(), m: today.getMonth()});
  }

  const todayStr = dateToStr(today);
  const monthLabel = `${viewMonth.y}年 ${viewMonth.m + 1}月`;

  // 今月のサマリー
  const monthEvents = events.filter(e => {
    const d = new Date(e.date);
    return !isNaN(d.getTime()) && d.getFullYear() === viewMonth.y && d.getMonth() === viewMonth.m && e.status !== "アーカイブ";
  });
  const monthTodos = todos.filter(t => {
    const d = new Date(t.deadline);
    return !isNaN(d.getTime()) && d.getFullYear() === viewMonth.y && d.getMonth() === viewMonth.m;
  });

  return (
    <div className="page" data-page="schedule">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>スケジュール</span></div>
          <h1>スケジュール</h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${monthLabel}: ${monthEvents.length}件のイベント、${monthTodos.length}件のタスク。`}</div>
        </div>
        <div className="ph-right">
          <a href="#event-create" className="btn btn-indigo"><Icon n="plus" s={14}/> イベント作成</a>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="card">
        <div className="card-head">
          <div className="row" style={{gap:10,alignItems:'center'}}>
            <button className="btn btn-soft btn-sm btn-icon" onClick={prevMonth} title="前の月"><Icon n="chevLeft" s={12}/></button>
            <div style={{fontFamily:'var(--serif)',fontSize:20,letterSpacing:'-.015em',minWidth:140,textAlign:'center'}}>{monthLabel}</div>
            <button className="btn btn-soft btn-sm btn-icon" onClick={nextMonth} title="次の月"><Icon n="chevRight" s={12}/></button>
            <button className="btn btn-soft btn-sm" onClick={goToday}>今月</button>
          </div>
          <div style={{fontSize:11,color:'var(--ink4)'}}>
            <span style={{display:'inline-block',width:10,height:10,background:'var(--indigo)',borderRadius:2,marginRight:4,verticalAlign:'middle'}}></span> イベント
            <span style={{display:'inline-block',width:10,height:10,background:'var(--coral)',borderRadius:2,marginRight:4,marginLeft:14,verticalAlign:'middle'}}></span> タスク
          </div>
        </div>

        <div className="card-body" style={{padding:0}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--line)',background:'var(--bg2)'}}>
            {['日','月','火','水','木','金','土'].map((d, i) => (
              <div key={d} style={{padding:'10px 8px',textAlign:'center',fontSize:11,fontWeight:700,color: i===0 ? 'var(--coral)' : i===6 ? 'var(--indigo)' : 'var(--ink3)',letterSpacing:'.05em'}}>
                {d}
              </div>
            ))}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
            {days.map((day, i) => {
              const ds = dateToStr(day.date);
              const isToday = ds === todayStr;
              const items = getItemsAt(ds);
              const dow = day.date.getDay();
              return (
                <div key={i} style={{
                  minHeight:96,
                  padding:6,
                  borderRight: (i+1) % 7 === 0 ? 'none' : '1px solid var(--line)',
                  borderBottom: i < 35 ? '1px solid var(--line)' : 'none',
                  background: isToday ? 'var(--indigo-50)' : day.inMonth ? 'var(--white)' : 'var(--bg2)',
                  opacity: day.inMonth ? 1 : 0.5,
                }}>
                  <div style={{
                    fontSize:12,
                    fontWeight: isToday ? 700 : 500,
                    color: isToday ? 'var(--indigo)' : dow === 0 ? 'var(--coral)' : dow === 6 ? 'var(--indigo)' : 'var(--ink2)',
                    marginBottom:4,
                  }}>{day.date.getDate()}</div>
                  <div className="stack" style={{gap:2}}>
                    {items.events.slice(0, 2).map(e => (
                      <div key={`e-${e.id}`} title={`${e.title} - ${e.time || '時間未定'}`} style={{
                        fontSize:10,
                        padding:'2px 5px',
                        background:`var(--${e.accent}-50)`,
                        color:`var(--${e.accent})`,
                        borderRadius:3,
                        borderLeft:`2px solid var(--${e.accent})`,
                        whiteSpace:'nowrap',
                        overflow:'hidden',
                        textOverflow:'ellipsis',
                        cursor:'pointer',
                        fontWeight:600,
                      }}>{e.title}</div>
                    ))}
                    {items.todos.slice(0, 2).map(t => (
                      <div key={`t-${t.id}`} title={`${t.task} (${t.priority}優先)`} style={{
                        fontSize:10,
                        padding:'2px 5px',
                        background:'var(--coral-50)',
                        color:'var(--coral)',
                        borderRadius:3,
                        borderLeft:'2px solid var(--coral)',
                        whiteSpace:'nowrap',
                        overflow:'hidden',
                        textOverflow:'ellipsis',
                      }}>✓ {t.task}</div>
                    ))}
                    {(items.events.length + items.todos.length) > 4 && (
                      <div style={{fontSize:9,color:'var(--ink4)',padding:'1px 5px'}}>
                        +{items.events.length + items.todos.length - 4}件
                      </div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="grid-ab mt16">
        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="cal" s={16}/> {monthLabel}のイベント</div>
            <span className="badge badge-indigo">{monthEvents.length}件</span>
          </div>
          {monthEvents.length === 0 ? (
            <div className="empty" style={{padding:'30px 14px'}}>
              <div style={{fontSize:12}}>{loading ? '…' : 'この月のイベントはありません'}</div>
            </div>
          ) : (
            <div className="card-body" style={{padding:0,maxHeight:360,overflowY:'auto'}}>
              {monthEvents.sort((a,b) => (a.date||'').localeCompare(b.date||'')).map((e, i) => (
                <div key={e.id} style={{padding:'12px 16px',borderTop:i?'1px solid var(--line)':'none',display:'flex',gap:10,alignItems:'center'}}>
                  <div style={{width:4,height:32,background:`var(--${e.accent})`,borderRadius:2}}></div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13}}>{e.title}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{e.date} {e.time || ''} · {e.venue || '会場未定'}</div>
                  </div>
                  <span className={clsx("badge", e.status==="公開中"?"badge-green":e.status==="満員"?"badge-coral":"badge-ink")} style={{fontSize:10}}>
                    {e.status}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="check2" s={16}/> {monthLabel}のタスク</div>
            <span className="badge badge-coral">{monthTodos.filter(t=>!t.done).length}件 未完了</span>
          </div>
          {monthTodos.length === 0 ? (
            <div className="empty" style={{padding:'30px 14px'}}>
              <div style={{fontSize:12}}>{loading ? '…' : 'この月のタスクはありません'}</div>
            </div>
          ) : (
            <div className="card-body" style={{padding:0,maxHeight:360,overflowY:'auto'}}>
              {monthTodos.sort((a,b) => (a.deadline||'').localeCompare(b.deadline||'')).map((t, i) => (
                <div key={t.id} style={{padding:'12px 16px',borderTop:i?'1px solid var(--line)':'none',display:'flex',gap:10,alignItems:'center',opacity:t.done?0.5:1}}>
                  <span className={clsx("ck", t.done && "on")}></span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,textDecoration:t.done?'line-through':'none'}}>{t.task}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>
                      {t.deadline || '期限未定'}
                      {t.assignee && ` · ${t.assignee}`}
                      {t.eventTitle && ` · ${t.eventTitle}`}
                    </div>
                  </div>
                  <span className={clsx("badge", t.priority==="高"?"badge-coral":t.priority==="中"?"badge-indigo":"badge-ink")} style={{fontSize:10}}>{t.priority}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

window.PageNotifications = PageNotifications;

window.PageQR = PageQR;

<script type="text/babel" data-presets="react">

// -------------------- PageAnalytics --------------------

/**
 * KPIレポート。データ空時は KPI を `—` 表示、チャートは Empty 状態のままレンダ。
 */
function PageAnalytics(){
  const [events, setEvents] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [registrations, setRegistrations] = useState([]);
  const [payments, setPayments] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [period, setPeriod] = useState("month");

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [evs, parts, regs, pays] = await Promise.all([
          window.fetchData('listEvents'),
          window.fetchData('listParticipants'),
          window.fetchData('listRegistrations'),
          window.fetchData('listPayments'),
        ]);
        if (cancelled) return;
        setEvents(Array.isArray(evs) ? evs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
        setRegistrations(Array.isArray(regs) ? regs : []);
        setPayments(Array.isArray(pays) ? pays : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // ========== 期間判定 ==========
  const today = new Date();
  function inPeriod(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    if (isNaN(d.getTime())) return false;
    if (period === "all") return true;
    if (period === "month") {
      return d.getFullYear() === today.getFullYear() && d.getMonth() === today.getMonth();
    }
    if (period === "quarter") {
      const q = Math.floor(today.getMonth() / 3);
      const dq = Math.floor(d.getMonth() / 3);
      return d.getFullYear() === today.getFullYear() && dq === q;
    }
    if (period === "year") {
      return d.getFullYear() === today.getFullYear();
    }
    return true;
  }

  // ========== 集計 ==========
  const activeRegs = registrations.filter(r => r.status !== "キャンセル");
  const periodRegs = activeRegs.filter(r => inPeriod(r.appliedAt));
  const periodEvents = events.filter(e => inPeriod(e.date) && e.status !== "アーカイブ");
  const periodPayments = payments.filter(p => p.status === "成功" && inPeriod(p.paidAt));

  const totalReg = periodRegs.length;
  const totalRev = periodPayments.reduce((s, p) => s + (p.amount || 0), 0);
  const checkedIn = periodRegs.filter(r => r.status === "チェックイン済").length;
  const confirmed = periodRegs.filter(r => r.status === "確定").length;
  const attendBase = checkedIn + confirmed;
  const attendRate = attendBase > 0 ? Math.round(checkedIn / attendBase * 100) : null;
  const npsValues = participants.filter(p => p.nps && p.status !== "アーカイブ").map(p => p.nps);
  const avgNps = npsValues.length > 0 ? Math.round(npsValues.reduce((s, v) => s + v, 0) / npsValues.length) : null;

  // ========== カテゴリ別 ==========
  const categoryStats = {IFT: {regs:0, rev:0, ev:0}, community: {regs:0, rev:0, ev:0}, hub: {regs:0, rev:0, ev:0}, "order made": {regs:0, rev:0, ev:0}};
  periodEvents.forEach(e => { if (categoryStats[e.category]) categoryStats[e.category].ev++; });
  periodRegs.forEach(r => {
    const ev = events.find(e => e.id === r.eventId);
    if (ev && categoryStats[ev.category]) categoryStats[ev.category].regs++;
  });
  periodPayments.forEach(p => {
    const ev = events.find(e => e.id === p.eventId);
    if (ev && categoryStats[ev.category]) categoryStats[ev.category].rev += (p.amount || 0);
  });

  // ========== イベント別パフォーマンス ==========
  const eventPerf = periodEvents.map(e => {
    const evRegs = activeRegs.filter(r => r.eventId === e.id);
    const evCheckedIn = evRegs.filter(r => r.status === "チェックイン済").length;
    const evRev = payments.filter(p => p.eventId === e.id && p.status === "成功").reduce((s, p) => s + (p.amount || 0), 0);
    return {
      ...e,
      regCount: evRegs.length,
      attendRate: (evCheckedIn + evRegs.filter(r => r.status === "確定").length) > 0
        ? Math.round(evCheckedIn / (evCheckedIn + evRegs.filter(r => r.status === "確定").length) * 100)
        : null,
      revenue: evRev,
    };
  }).sort((a, b) => b.regCount - a.regCount);

  const periodLabel = {month:'今月', quarter:'今四半期', year:'今年', all:'全期間'}[period] || '今月';

  return (
    <div className="page" data-page="analytics">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>概要</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>KPIレポート</span></div>
          <h1>KPI <i>レポート</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${periodLabel}のパフォーマンス。${periodEvents.length}件のイベント、${totalReg}件の申込を集計。`}</div>
        </div>
        <div className="ph-right">
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="row mb16" style={{gap:6}}>
        {[["month","今月"],["quarter","今四半期"],["year","今年"],["all","全期間"]].map(([k, l]) => (
          <span key={k} className={clsx("chip", period===k && "on")} onClick={()=>setPeriod(k)}>{l}</span>
        ))}
      </div>

      <div className="kpi-grid">
        <MiniStat label={`${periodLabel}の申込数`} value={loading ? '…' : String(totalReg)} sub={`${periodEvents.length}イベント対象`} icon="users" color="indigo"/>
        <MiniStat label={`${periodLabel}の収益`} value={loading ? '…' : (totalRev > 0 ? yen(totalRev) : '0')} sub={`${periodPayments.length}件 成功`} icon="yen" color="coral"/>
        <MiniStat label="出席率" value={loading ? '…' : (attendRate !== null ? `${attendRate}%` : '—')} sub={`${checkedIn}/${attendBase}`} icon="check2" color="green"/>
        <MiniStat label="平均 NPS" value={loading ? '…' : (avgNps !== null ? String(avgNps) : '—')} sub={`${npsValues.length}件`} icon="star" color="violet"/>
      </div>

      <div className="grid-ab">
        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="layers" s={16}/> イベント別パフォーマンス</div>
            <span style={{fontSize:11,color:'var(--ink4)'}}>{periodLabel}</span>
          </div>
          {!loading && eventPerf.length === 0 ? (
            <div className="empty" style={{padding:'40px 20px'}}>
              <Icon n="cal" s={24}/>
              <div style={{fontSize:13}}>{periodLabel}のイベントはありません</div>
              <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>別の期間を選んでみてください</div>
            </div>
          ) : (
            <table className="tbl">
              <thead><tr>
                <th>イベント</th>
                <th className="right">申込数</th>
                <th className="right">出席率</th>
                <th className="right">収益</th>
                <th>状態</th>
              </tr></thead>
              <tbody>
                {eventPerf.map(e => (
                  <tr key={e.id}>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <div style={{width:4,height:24,background:`var(--${e.accent})`,borderRadius:2}}></div>
                        <div>
                          <div style={{fontWeight:600}}>{e.title}</div>
                          <div style={{fontSize:11,color:'var(--ink4)'}}>{e.date || '—'} · {e.category}</div>
                        </div>
                      </div>
                    </td>
                    <td className="right num"><b>{e.regCount}</b> / {e.capacity || 0}</td>
                    <td className="right num">{e.attendRate !== null ? `${e.attendRate}%` : '—'}</td>
                    <td className="right num"><b>{e.revenue > 0 ? yen(e.revenue) : '—'}</b></td>
                    <td><span className={clsx("badge", e.status==="公開中"?"badge-green":e.status==="満員"?"badge-coral":"badge-ink")}><span className="badge-dot"></span>{e.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="tag" s={16}/> イニシアチブ別</div></div>
            <div className="card-body stack" style={{gap:12}}>
              {Object.entries(categoryStats).map(([cat, s]) => {
                const accentMap = {"IFT":"indigo","community":"teal","hub":"violet","order made":"amber"};
                const c = accentMap[cat] || 'ink';
                return (
                  <div key={cat}>
                    <div className="row between" style={{fontSize:12,marginBottom:4}}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{width:8,height:8,borderRadius:2,background:`var(--${c})`}}></span>
                        <span style={{fontWeight:600}}>{cat}</span>
                      </div>
                      <span className="mono" style={{fontSize:11}}>{s.ev}件</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:11,color:'var(--ink3)'}}>
                      <div>申込: <b style={{color:'var(--ink)'}}>{s.regs}</b></div>
                      <div>収益: <b style={{color:'var(--ink)'}}>{s.rev > 0 ? yen(s.rev) : '—'}</b></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/**
 * アルバム作成・編集モーダル。
 */
function AlbumModal({mode, initialValues, events, onSave, onCancel}){
  const init = initialValues || {};
  const [title, setTitle] = useState(init.title || "");
  const [eventId, setEventId] = useState(init.eventId || "");
  const [description, setDescription] = useState(init.description || "");
  const [imageUrlsText, setImageUrlsText] = useState(
    Array.isArray(init.imageUrls) ? init.imageUrls.join('\n') : (init.imageUrls || "")
  );
  const [coverUrl, setCoverUrl] = useState(init.coverUrl || "");
  const [shotDate, setShotDate] = useState(init.shotDate || "");
  const [status, setStatus] = useState(init.status || "下書き");
  const [shareLink, setShareLink] = useState(init.shareLink || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!title.trim()) { setError("タイトルは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      const urls = imageUrlsText.split(/[\n,]/).map(s=>s.trim()).filter(Boolean);
      await onSave({
        title: title.trim(),
        eventId,
        description: description.trim(),
        imageUrls: urls,
        coverUrl: coverUrl.trim() || (urls[0] || ""),
        shotDate, status,
        shareLink: shareLink.trim(),
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:680,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="img" s={16}/> {mode === "create" ? "アルバムを作成" : "アルバムを編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">タイトル <span className="field-req">*</span></label>
            <input className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 2026春IFT 鎌倉ハイキング"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">対象イベント (任意)</label>
              <div className="select-wrap">
                <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>
                  <option value="">紐付けなし</option>
                  {events.filter(e => e.status !== "アーカイブ").map(e => (
                    <option key={e.id} value={e.id}>[{e.id}] {e.title}</option>
                  ))}
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">撮影日</label>
              <input className="input" type="date" value={shotDate} onChange={e=>setShotDate(e.target.value)}/>
            </div>
          </div>
          <div className="field">
            <label className="field-label">説明</label>
            <textarea className="input" style={{height:60,padding:10,resize:'vertical'}} value={description} onChange={e=>setDescription(e.target.value)} placeholder="このアルバムの説明..."/>
          </div>
          <div className="field">
            <label className="field-label">画像URL一覧</label>
            <textarea className="input" style={{height:120,padding:10,resize:'vertical',fontFamily:'var(--mono)',fontSize:12}}
              value={imageUrlsText} onChange={e=>setImageUrlsText(e.target.value)}
              placeholder="https://drive.google.com/...&#10;https://example.com/photo2.jpg&#10;..."/>
            <div className="field-hint">1行 1 URL、またはカンマ区切り。Drive の共有リンクも可</div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">カバー画像URL (任意)</label>
              <input className="input" value={coverUrl} onChange={e=>setCoverUrl(e.target.value)} placeholder="未指定なら最初の画像を使用"/>
            </div>
            <div className="field">
              <label className="field-label">共有リンク (任意)</label>
              <input className="input" value={shareLink} onChange={e=>setShareLink(e.target.value)} placeholder="https://drive.google.com/drive/folders/..."/>
              <div className="field-hint">参加者に渡す Drive フォルダリンク等</div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">ステータス</label>
            <div className="select-wrap">
              <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                <option>下書き</option>
                <option>限定公開</option>
                <option>公開中</option>
                <option>アーカイブ</option>
              </select>
            </div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '作成' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

function PagePhotos(){

  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("active");
  const [editing, setEditing] = useState(null);
  const [selectedAlbum, setSelectedAlbum] = useState(null);   // 詳細表示

  async function fetchAll() {
    setLoading(true);
    setError(null);
    try {
      const [als, evs] = await Promise.all([
        window.fetchData('listAlbums'),
        window.fetchData('listEvents'),
      ]);
      setAlbums(Array.isArray(als) ? als : []);
      setEvents(Array.isArray(evs) ? evs : []);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchAll(); }, []);

  const visibleAlbums = albums.filter(a => {
    if (filter === "active") return a.status !== "アーカイブ";
    if (filter === "archived") return a.status === "アーカイブ";
    return true;
  });

  const totalPhotos = albums.reduce((s, a) => s + (a.imageUrls ? a.imageUrls.length : 0), 0);
  const publicCount = albums.filter(a => a.status === "公開中").length;

  async function handleCreate(payload) {
    await window.postData('createAlbum', payload);
    setEditing(null);
    window.toast.success('アルバムを作成しました');
    await fetchAll();
  }
  async function handleUpdate(albumId, payload) {
    await window.postData('updateAlbum', {albumId, fields: payload});
    setEditing(null);
    window.toast.success('アルバムを更新しました');
    await fetchAll();
  }
  async function handleDelete(albumId, title) {

      title: `「${title}」をアーカイブしますか?`,
      body: '行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。',
      danger: true,
      confirmLabel: 'アーカイブ',

    try {
      await window.postData('deleteAlbum', {albumId});
      if (selectedAlbum && selectedAlbum.id === albumId) setSelectedAlbum(null);
      window.toast.success('アーカイブしました');
      await fetchAll();
    } catch (err) {
      window.toast.error('削除に失敗しました: ' + err.message);

  return (

      <div className="page-head">
        <div className="ph-left">

          <h1>写真 <i>管理</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${albums.filter(a=>a.status!=='アーカイブ').length}アルバム、${totalPhotos}枚、${publicCount}件 公開中。`}</div>
        </div>
        <div className="ph-right">
          {window.canDo('albums.create') && (
          <button className="btn btn-indigo" onClick={()=>setEditing({mode:'create', values:{}})}>
            <Icon n="plus" s={14}/> アルバム作成
          </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid">
        <MiniStat label="アルバム数" value={loading ? '…' : String(albums.filter(a=>a.status!=='アーカイブ').length)} sub="全期間" icon="img" color="indigo"/>
        <MiniStat label="写真枚数" value={loading ? '…' : String(totalPhotos)} sub="登録URL合計" icon="camera" color="teal"/>
        <MiniStat label="公開中" value={loading ? '…' : String(publicCount)} sub="参加者閲覧可" icon="eye" color="green"/>
        <MiniStat label="アーカイブ" value={loading ? '…' : String(albums.filter(a=>a.status==='アーカイブ').length)} sub="削除済" icon="trash" color="ink"/>
      </div>

      <div className="tabs">
        {[["active","現役", albums.filter(a=>a.status!=='アーカイブ').length], ["archived","アーカイブ", albums.filter(a=>a.status==='アーカイブ').length], ["all","全部", albums.length]].map(([k,l,c]) => (
          <div key={k} className={clsx("tab", filter===k && "active")} onClick={()=>setFilter(k)}>
            {l}<span className="count">{c}</span>
          </div>
        ))}
      </div>

      {!loading && visibleAlbums.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 20px'}}>
            <Icon n="img" s={28}/>
            <div style={{fontSize:14,marginTop:8}}>アルバムがありません</div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4}}>「アルバム作成」から登録できます</div>
          </div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))',gap:14}}>
          {visibleAlbums.map(a => (
            <div key={a.id} className="card" style={{cursor:'pointer'}} onClick={()=>setSelectedAlbum(a)}>
              <div style={{aspectRatio:'4/3',background:`var(--${a.eventAccent}-50)`,position:'relative',overflow:'hidden'}}>
                {a.coverUrl ? (
                  <img src={a.coverUrl} alt={a.title} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={(e)=>{e.target.style.display='none';}}/>
                ) : (
                  <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',color:`var(--${a.eventAccent})`}}>
                    <Icon n="img" s={40}/>
                  </div>
                )}
                <span className={clsx("badge", a.status==="公開中"?"badge-green":a.status==="限定公開"?"badge-amber":a.status==="アーカイブ"?"badge-ink":"badge-coral")} style={{position:'absolute',top:8,right:8}}>
                  <span className="badge-dot"></span>{a.status}
                </span>
                <span style={{position:'absolute',bottom:8,right:8,padding:'3px 8px',background:'rgba(0,0,0,0.6)',color:'white',borderRadius:10,fontSize:11,fontWeight:600}}>
                  {a.imageUrls.length}枚
                </span>
              </div>
              <div className="card-body" style={{padding:12}}>
                <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{a.title}</div>
                <div style={{fontSize:11,color:'var(--ink4)',display:'flex',gap:6,flexWrap:'wrap'}}>
                  <span className="mono">{a.id}</span>
                  {a.eventTitle && <><span>·</span><span>{a.eventTitle}</span></>}
                  {a.shotDate && <><span>·</span><span>{a.shotDate}</span></>}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* 詳細モーダル */}
      {selectedAlbum && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}} onClick={()=>setSelectedAlbum(null)}>
          <div className="card" style={{width:900,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
            <div className="card-head">
              <div>
                <div className="card-title"><Icon n="img" s={16}/> {selectedAlbum.title}</div>
                <div style={{fontSize:11,color:'var(--ink4)',marginTop:2}}>
                  <span className="mono">{selectedAlbum.id}</span>
                  {selectedAlbum.eventTitle && ` · ${selectedAlbum.eventTitle}`}
                  {selectedAlbum.shotDate && ` · 撮影: ${selectedAlbum.shotDate}`}
                </div>
              </div>
              <div style={{display:'flex',gap:6}}>
                {selectedAlbum.shareLink && (
                  <a href={selectedAlbum.shareLink} target="_blank" rel="noopener noreferrer" className="btn btn-soft btn-sm">
                    <Icon n="link" s={12}/> 共有リンク
                  </a>
                )}
                {window.canDo('albums.update') && (
                  <button className="btn btn-soft btn-sm" onClick={()=>{setEditing({mode:'edit', values:selectedAlbum}); setSelectedAlbum(null);}}>
                    <Icon n="edit" s={12}/> 編集
                  </button>
                )}
                {selectedAlbum.status !== 'アーカイブ' && window.canDo('albums.delete') && (
                  <button className="btn btn-soft btn-sm" onClick={()=>handleDelete(selectedAlbum.id, selectedAlbum.title)} style={{color:'var(--coral)'}}>
                    <Icon n="trash" s={12}/>
                  </button>
                )}
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>setSelectedAlbum(null)}><Icon n="x" s={14}/></button>
              </div>
            </div>
            <div className="card-body">
              {selectedAlbum.description && (
                <div style={{padding:12,background:'var(--bg2)',borderRadius:8,fontSize:12,marginBottom:14,lineHeight:1.6}}>
                  {selectedAlbum.description}
                </div>
              )}
              {selectedAlbum.imageUrls.length === 0 ? (
                <div className="empty" style={{padding:'40px 20px'}}>
                  <div style={{fontSize:13}}>このアルバムには画像が登録されていません</div>
                </div>
              ) : (
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(160px, 1fr))',gap:8}}>
                  {selectedAlbum.imageUrls.map((url, i) => (
                    <a key={i} href={url} target="_blank" rel="noopener noreferrer" style={{aspectRatio:'1',background:'var(--bg2)',borderRadius:6,overflow:'hidden',position:'relative',display:'block'}}>
                      <img src={url} alt={`photo-${i+1}`} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={(e)=>{e.target.style.display='none';}}/>
                    </a>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {editing && (
        <AlbumModal
          mode={editing.mode}
          initialValues={editing.values}
          events={events}
          onSave={editing.mode === 'create' ? handleCreate : (payload => handleUpdate(editing.values.id, payload))}
          onCancel={()=>setEditing(null)}
        />
      )}
    </div>
  );
}

// PageSettings — 通知・PWA設定 (Phase 5新-E)
// =================================================================
function PageSettings(){
  const [settings, setSettings] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState({});   // {key: bool}
  const [error, setError] = useState(null);
  const [canInstall, setCanInstall] = useState(false);
  const [installed, setInstalled] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      try {
        const data = await window.fetchData('listNotificationSettings');
        if (!cancelled) setSettings(data || {});
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    setCanInstall(!!window._canInstallPWA);
    setInstalled(window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);
    const checkInterval = setInterval(() => {
      if (!cancelled) setCanInstall(!!window._canInstallPWA);
    }, 1000);
    return () => { cancelled = true; clearInterval(checkInterval); };
  }, []);

  async function updateSetting(key, value) {
    setSaving(prev => ({...prev, [key]: true}));
    try {
      await window.postData('updateNotificationSetting', { key, value: String(value) });
      setSettings(prev => ({...prev, [key]: String(value)}));
      window.toast.success('保存しました');
    } catch (err) {
      window.toast.error('保存に失敗: ' + err.message);
    } finally {
      setSaving(prev => ({...prev, [key]: false}));
    }
  }

  async function handleSendTest() {
    if (!await window.confirmDialog({
      title: 'テストメールを送信しますか?',
      body: `送信先: ${settings.email_default_recipient || '未設定'}`,
    })) return;
    try {
      await window.postData('sendTestNotification', {});
      window.toast.success('テストメールを送信しました。Gmail を確認してください。');
    } catch (err) {
      window.toast.error('送信失敗: ' + err.message);
    }
  }

  async function handleInstallPWA() {
    if (window.installPWA) {
      const ok = await window.installPWA();
      if (ok) {
        setInstalled(true);
        setCanInstall(false);
        window.toast.success('インストールが完了しました');
      }
    }
  }

  const isOn = (key) => settings[key] === 'true';

  return (
    <div className="page" data-page="settings">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>設定</span></div>
          <h1>通知 <i>設定</i></h1>
          <div className="ph-sub">メール通知、Todo リマインダー、PWA インストールの設定。</div>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>エラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="mail" s={16}/> メール通知</div></div>
            <div className="card-body stack" style={{gap:14}}>
              <div className="field">
                <label className="field-label">デフォルト送信先</label>
                <input className="input" type="email"
                  value={settings.email_default_recipient || ''}
                  onChange={e=>setSettings(prev => ({...prev, email_default_recipient: e.target.value}))}
                  onBlur={e=>updateSetting('email_default_recipient', e.target.value)}
                  placeholder="connecta.official@gmail.com"/>
                <div className="field-hint">代表/副代表向け通知のデフォルト送信先 (フォーカスを外すと自動保存)</div>
              </div>

              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {[
                  {key:'todo_reminder_enabled', label:'Todo 期限リマインダー', desc:'毎朝 9:00 (JST) に担当者へ送信'},
                  {key:'registration_new_enabled', label:'新規申込通知', desc:'参加申込が入った時に代表/副代表へ送信'},
                  {key:'event_full_enabled', label:'イベント満員通知', desc:'定員に達した時に役員へ送信'},
                  {key:'survey_response_enabled', label:'アンケート回答通知', desc:'新しい回答が入った時に送信'},
                ].map(item => (
                  <div key={item.key} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'var(--bg2)',borderRadius:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{item.label}</div>
                      <div style={{fontSize:11,color:'var(--ink4)',marginTop:2}}>{item.desc}</div>
                    </div>
                    <label style={{position:'relative',display:'inline-flex',cursor:'pointer'}}>
                      <input type="checkbox"
                        checked={isOn(item.key)}
                        onChange={e=>updateSetting(item.key, e.target.checked)}
                        disabled={saving[item.key]}
                        style={{position:'absolute',opacity:0,width:0,height:0}}/>
                      <span style={{
                        width:42,height:24,borderRadius:12,
                        background: isOn(item.key) ? 'var(--green)' : 'var(--ink5)',
                        position:'relative',transition:'background .2s',
                      }}>
                        <span style={{
                          position:'absolute',top:2,left: isOn(item.key) ? 20 : 2,
                          width:20,height:20,borderRadius:10,background:'white',
                          transition:'left .2s',
                        }}></span>
                      </span>
                    </label>
                  </div>
                ))}
              </div>

              <div style={{paddingTop:12,borderTop:'1px dashed var(--line)',display:'flex',gap:8}}>
                <button className="btn btn-soft btn-sm" onClick={handleSendTest}>
                  <Icon n="send" s={12}/> テストメール送信
                </button>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="info" s={16}/> 通知の動作</div></div>
            <div className="card-body" style={{fontSize:12,color:'var(--ink3)',lineHeight:1.7}}>
              <p>通知システムは以下の動作をします:</p>
              <ul style={{marginTop:8,paddingLeft:18,fontSize:11.5,lineHeight:1.8}}>
                <li><b>Todo 期限</b>: 毎朝 9:00 JST (時間トリガー) に各担当者へ送信</li>
                <li><b>新規申込</b>: 申込が入った瞬間に代表/副代表へ送信</li>
                <li><b>満員通知</b>: 定員到達した瞬間に役員へ送信 (1日1回まで)</li>
                <li><b>アプリ内通知</b>: ベルアイコンに件数表示、60秒ごとに更新</li>
              </ul>
              <div style={{padding:10,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:8,fontSize:11,marginTop:14,lineHeight:1.6}}>
                <b style={{color:'var(--amber)'}}>初回設定:</b> GAS エディタで <code style={{background:'white',padding:'1px 4px',borderRadius:3}}>setupTimeTriggers</code> を実行してください。これで朝9時の自動送信が有効になります。
              </div>
            </div>
          </div>
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="phone" s={16}/> ホーム画面に追加 (PWA)</div></div>
            <div className="card-body stack" style={{gap:12}}>
              {installed ? (
                <div style={{padding:14,background:'var(--green-50)',border:'1px solid var(--green-100)',borderRadius:8,fontSize:13,color:'var(--green)',display:'flex',alignItems:'center',gap:8}}>
                  <Icon n="check2" s={16}/> インストール済み
                </div>
              ) : canInstall ? (
                <>
                  <div style={{fontSize:12,color:'var(--ink3)',lineHeight:1.6}}>
                    アプリをホーム画面にインストールできます。インストールすると、ブラウザのアドレスバーなしで、まるでネイティブアプリのように使えます。
                  </div>
                  <button className="btn btn-indigo" onClick={handleInstallPWA}>
                    <Icon n="plus" s={14}/> アプリをインストール
                  </button>
                </>
              ) : (
                <div style={{fontSize:12,color:'var(--ink3)',lineHeight:1.6}}>
                  <div style={{padding:10,background:'var(--bg2)',borderRadius:8,marginBottom:10}}>
                    <b style={{fontSize:12.5}}>iPhone (Safari):</b><br/>
                    <span style={{fontSize:11.5}}>共有ボタン → 「ホーム画面に追加」</span>
                  </div>
                  <div style={{padding:10,background:'var(--bg2)',borderRadius:8,marginBottom:10}}>
                    <b style={{fontSize:12.5}}>Android (Chrome):</b><br/>
                    <span style={{fontSize:11.5}}>メニュー (︙) → 「ホーム画面に追加」</span>
                  </div>
                  <div style={{padding:10,background:'var(--bg2)',borderRadius:8}}>
                    <b style={{fontSize:12.5}}>PC (Chrome / Edge):</b><br/>
                    <span style={{fontSize:11.5}}>アドレスバー右の「インストール」アイコン</span>
                  </div>
                </div>
              )}
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="bell" s={16}/> プッシュ通知</div></div>
            <div className="card-body" style={{fontSize:12,color:'var(--ink3)',lineHeight:1.7}}>
              <p>現状、プッシュ通知は <b>Gmail 経由</b>で届きます。スマートフォンの Gmail アプリで通知を ON にしてください。</p>
              <div style={{padding:10,background:'var(--indigo-50)',border:'1px solid var(--indigo-100)',borderRadius:8,fontSize:11,marginTop:10,lineHeight:1.6}}>
                <b style={{color:'var(--indigo)'}}>プッシュ通知</b>は Gmail 経由で届きます。スマートフォンの Gmail アプリで通知を有効にしてください。
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/**
 * 団体紹介。connec+a の公開プロフィールを編集する画面。
 */
function PageOrg(){
  const [org, setOrg] = useState({});
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);
  const [dirty, setDirty] = useState(false);

  // フォーム state
  const [name, setName] = useState("");
  const [nameEn, setNameEn] = useState("");
  const [foundedAt, setFoundedAt] = useState("");
  const [mission, setMission] = useState("");
  const [vision, setVision] = useState("");
  const [description, setDescription] = useState("");
  const [logoUrl, setLogoUrl] = useState("");
  const [coverUrl, setCoverUrl] = useState("");
  const [representative, setRepresentative] = useState("");
  const [location, setLocation] = useState("");
  const [contactEmail, setContactEmail] = useState("");
  const [websiteUrl, setWebsiteUrl] = useState("");
  const [instagram, setInstagram] = useState("");
  const [twitter, setTwitter] = useState("");
  const [facebook, setFacebook] = useState("");
  const [youtube, setYoutube] = useState("");

  function applyData(data) {
    setName(data.name || "");
    setNameEn(data.nameEn || "");
    setFoundedAt(data.foundedAt || "");
    setMission(data.mission || "");
    setVision(data.vision || "");
    setDescription(data.description || "");
    setLogoUrl(data.logoUrl || "");
    setCoverUrl(data.coverUrl || "");
    setRepresentative(data.representative || "");
    setLocation(data.location || "");
    setContactEmail(data.contactEmail || "");
    setWebsiteUrl(data.websiteUrl || "");
    setInstagram(data.instagram || "");
    setTwitter(data.twitter || "");
    setFacebook(data.facebook || "");
    setYoutube(data.youtube || "");
  }

  async function fetchData() {
    setLoading(true);
    setError(null);
    try {
      const data = await window.fetchData('getOrg');
      const safe = data || {};
      setOrg(safe);
      applyData(safe);
      setDirty(false);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchData(); }, []);

  // 未保存変更がある状態で画面離脱を防止 (ブラウザ標準の確認ダイアログ)
  useEffect(() => {
    if (!dirty) return;
    const handler = (e) => {
      e.preventDefault();
      e.returnValue = '';   // Chrome は returnValue 必須
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, [dirty]);

  // 任意の field を変更したら dirty フラグ
  function setField(setter) {
    return (v) => { setter(v); setDirty(true); };
  }

  async function handleSave() {
    setSaving(true);
    setError(null);
    try {
      await window.postData('updateOrg', {
        fields: {
          name: name.trim(),
          nameEn: nameEn.trim(),
          foundedAt,
          mission: mission.trim(),
          vision: vision.trim(),
          description: description.trim(),
          logoUrl: logoUrl.trim(),
          coverUrl: coverUrl.trim(),
          representative: representative.trim(),
          location: location.trim(),
          contactEmail: contactEmail.trim(),
          websiteUrl: websiteUrl.trim(),
          instagram: instagram.trim(),
          twitter: twitter.trim(),
          facebook: facebook.trim(),
          youtube: youtube.trim(),
        }
      });
      window.toast.success('団体情報を保存しました');
      await fetchData();
    } catch (err) {
      window.toast.error('保存に失敗しました: ' + err.message);
      setError(err.message || String(err));
    } finally {
      setSaving(false);
    }
  }

  async function handleReset() {
    if (!dirty) return;
    if (!await window.confirmDialog({
      title: '変更を取り消しますか?',
      body: '保存していない変更が失われます。',
      warn: true,
      confirmLabel: '取り消す',
    })) return;
    applyData(org);
    setDirty(false);
    window.toast.info('変更を取り消しました');
  }

  return (
    <div className="page" data-page="org">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>団体紹介</span></div>
          <h1>団体 <i>紹介</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `connec+a の公開プロフィール。${org.updatedAt ? '最終更新: ' + new Date(org.updatedAt).toLocaleString('ja-JP') : '未保存'}`}</div>
        </div>
        <div className="ph-right">
          {dirty && (
            <button className="btn btn-ghost" onClick={handleReset} disabled={saving}>変更を取り消す</button>
          )}
          {window.canDo('org.update') && (
            <button className="btn btn-indigo" onClick={handleSave} disabled={saving || !dirty}>
              <Icon n="check2" s={14}/> {saving ? '保存中…' : '保存する'}
            </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>エラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="building" s={16}/> 基本情報</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">団体名 (日本語)</label>
                  <input className="input input-lg" value={name} onChange={e=>setField(setName)(e.target.value)} placeholder="例: connec+a"/>
                </div>
                <div className="field">
                  <label className="field-label">英名</label>
                  <input className="input" value={nameEn} onChange={e=>setField(setNameEn)(e.target.value)} placeholder="例: connec+a"/>
                </div>
              </div>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">設立日</label>
                  <input className="input" type="date" value={foundedAt} onChange={e=>setField(setFoundedAt)(e.target.value)}/>
                </div>
                <div className="field">
                  <label className="field-label">代表者</label>
                  <input className="input" value={representative} onChange={e=>setField(setRepresentative)(e.target.value)} placeholder="例: Rikky"/>
                </div>
              </div>
              <div className="field">
                <label className="field-label">所在地</label>
                <input className="input" value={location} onChange={e=>setField(setLocation)(e.target.value)} placeholder="例: 東京都"/>
              </div>
              <div className="field">
                <label className="field-label">連絡メール</label>
                <input className="input" type="email" value={contactEmail} onChange={e=>setField(setContactEmail)(e.target.value)} placeholder="connecta.official@gmail.com"/>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="sparkle" s={16}/> ミッション・ビジョン</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="field">
                <label className="field-label">ミッション</label>
                <textarea className="input" style={{height:80,padding:10,resize:'vertical'}} value={mission} onChange={e=>setField(setMission)(e.target.value)} placeholder="団体が果たす使命..."/>
              </div>
              <div className="field">
                <label className="field-label">ビジョン</label>
                <textarea className="input" style={{height:80,padding:10,resize:'vertical'}} value={vision} onChange={e=>setField(setVision)(e.target.value)} placeholder="将来実現したい姿..."/>
              </div>
              <div className="field">
                <label className="field-label">紹介文</label>
                <textarea className="input" style={{height:140,padding:10,resize:'vertical'}} value={description} onChange={e=>setField(setDescription)(e.target.value)} placeholder="団体の活動概要、成り立ち、特徴など..."/>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="link" s={16}/> SNS / Web</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="field">
                <label className="field-label">公式 Web サイト</label>
                <input className="input" type="url" value={websiteUrl} onChange={e=>setField(setWebsiteUrl)(e.target.value)} placeholder="https://connecta.example.com"/>
              </div>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">Instagram</label>
                  <input className="input" value={instagram} onChange={e=>setField(setInstagram)(e.target.value)} placeholder="@connecta_official または URL"/>
                </div>
                <div className="field">
                  <label className="field-label">X / Twitter</label>
                  <input className="input" value={twitter} onChange={e=>setField(setTwitter)(e.target.value)} placeholder="@connecta_official または URL"/>
                </div>
              </div>
              <div className="grid-2" style={{gap:14}}>
                <div className="field">
                  <label className="field-label">Facebook</label>
                  <input className="input" value={facebook} onChange={e=>setField(setFacebook)(e.target.value)} placeholder="ページURL"/>
                </div>
                <div className="field">
                  <label className="field-label">YouTube</label>
                  <input className="input" value={youtube} onChange={e=>setField(setYoutube)(e.target.value)} placeholder="チャンネルURL"/>
                </div>
              </div>

/**
 * 広告作成・編集モーダル。
 */
function AdModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [title, setTitle] = useState(init.title || "");
  const [type, setType] = useState(init.type || "バナー");
  const [placement, setPlacement] = useState(init.placement || "ダッシュボード");
  const [imageUrl, setImageUrl] = useState(init.imageUrl || "");
  const [linkUrl, setLinkUrl] = useState(init.linkUrl || "");
  const [startDate, setStartDate] = useState(init.startDate || "");
  const [endDate, setEndDate] = useState(init.endDate || "");
  const [status, setStatus] = useState(init.status || "下書き");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!title.trim()) { setError("タイトルは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        title: title.trim(),
        type, placement,
        imageUrl: imageUrl.trim(),
        linkUrl: linkUrl.trim(),
        startDate, endDate, status,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:600,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="megaphone" s={16}/> {mode === "create" ? "広告を作成" : "広告を編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">タイトル <span className="field-req">*</span></label>
            <input className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 春のIFT参加者募集バナー"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">種別</label>
              <div className="select-wrap">
                <select className="input select" value={type} onChange={e=>setType(e.target.value)}>
                  <option>バナー</option>
                  <option>動画</option>
                  <option>外部メディア</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">配置</label>
              <div className="select-wrap">
                <select className="input select" value={placement} onChange={e=>setPlacement(e.target.value)}>

                  <option>イベント詳細</option>
                  <option>申込フォーム</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">画像URL</label>
            <input className="input" value={imageUrl} onChange={e=>setImageUrl(e.target.value)} placeholder="https://example.com/banner.png"/>
            <div className="field-hint">バナー画像の URL。Google Drive 共有リンクも可</div>

          <div className="field">
            <label className="field-label">リンクURL</label>
            <input className="input" value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} placeholder="https://connecta.example.com/event/..."/>
            <div className="field-hint">バナークリック時の遷移先</div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">掲載開始日</label>
              <input className="input" type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}/>

              <label className="field-label">掲載終了日</label>
              <input className="input" type="date" value={endDate} onChange={e=>setEndDate(e.target.value)}/>

          </div>

            <label className="field-label">ステータス</label>
            <div className="select-wrap">
              <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>

  );
}

function PageAds(){
  const [ads, setAds] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("active");   // active / archived / all
  const [editing, setEditing] = useState(null);

  async function fetchAll() {
    setLoading(true);
    setError(null);
    try {
      const data = await window.fetchData('listAds');
      setAds(Array.isArray(data) ? data : []);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchAll(); }, []);

  const visibleAds = ads.filter(a => {
    if (filter === "active") return a.status !== "アーカイブ";
    if (filter === "archived") return a.status === "アーカイブ";
    return true;
  });

  // 集計
  const activeCount = ads.filter(a => a.status === "掲載中").length;
  const totalClicks = ads.reduce((s, a) => s + (a.clicks || 0), 0);
  const draftCount = ads.filter(a => a.status === "下書き").length;

  // ========== CRUD アクション ==========

  async function handleCreate(payload) {
    await window.postData('createAd', payload);
    setEditing(null);
    window.toast.success('広告を作成しました');
    await fetchAll();
  }

  async function handleUpdate(adId, payload) {
    await window.postData('updateAd', {adId, fields: payload});
    setEditing(null);
    window.toast.success('広告を更新しました');
    await fetchAll();
  }

  async function handleDelete(adId, title) {
    if (!await window.confirmDialog({
      title: `「${title}」をアーカイブしますか?`,
      body: '行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。',
      danger: true,
      confirmLabel: 'アーカイブ',
    })) return;
    try {
      await window.postData('deleteAd', {adId});
      window.toast.success('アーカイブしました');
      await fetchAll();
    } catch (err) {
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  return (
    <div className="page" data-page="ads">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>広告</span></div>
          <h1>広告 <i>管理</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${activeCount}件 掲載中、${draftCount}件 下書き、累計 ${totalClicks} クリック。`}</div>
        </div>
        <div className="ph-right">
          {window.canDo('ads.create') && (
          <button className="btn btn-indigo" onClick={()=>setEditing({mode:'create', values:{}})}>
            <Icon n="plus" s={14}/> 広告を作成
          </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid">
        <MiniStat label="掲載中" value={loading ? '…' : String(activeCount)} sub="アクティブ" icon="megaphone" color="green"/>
        <MiniStat label="下書き" value={loading ? '…' : String(draftCount)} sub="未公開" icon="edit" color="amber"/>
        <MiniStat label="総クリック数" value={loading ? '…' : String(totalClicks)} sub="累計" icon="trend" color="indigo"/>
        <MiniStat label="アーカイブ" value={loading ? '…' : String(ads.filter(a=>a.status==='アーカイブ').length)} sub="削除済" icon="trash" color="ink"/>
      </div>

      <div className="tabs">
        {[["active","現役", ads.filter(a=>a.status!=='アーカイブ').length], ["archived","アーカイブ", ads.filter(a=>a.status==='アーカイブ').length], ["all","全部", ads.length]].map(([k,l,c]) => (
          <div key={k} className={clsx("tab", filter===k && "active")} onClick={()=>setFilter(k)}>
            {l}<span className="count">{c}</span>
          </div>
        ))}
      </div>

      {!loading && visibleAds.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 20px'}}>
            <Icon n="megaphone" s={28}/>
            <div style={{fontSize:14,marginTop:8}}>広告がありません</div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4}}>「広告を作成」から登録できます</div>
          </div>
        </div>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))',gap:12}}>
          {visibleAds.map(ad => {
            const placementColor = {"ダッシュボード":"indigo","イベント詳細":"teal","申込フォーム":"violet"}[ad.placement] || "ink";
            const typeIcon = {"バナー":"img","動画":"camera","外部メディア":"link"}[ad.type] || "megaphone";
            return (
              <div key={ad.id} className="card">
                <div style={{aspectRatio:'16/9',background:`var(--${placementColor}-50)`,position:'relative',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
                  {ad.imageUrl ? (
                    <img src={ad.imageUrl} alt={ad.title} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={(e)=>{e.target.style.display='none';}}/>
                  ) : (
                    <div style={{textAlign:'center',color:`var(--${placementColor})`}}>
                      <Icon n={typeIcon} s={40}/>
                      <div style={{fontSize:11,marginTop:6,fontWeight:600}}>{ad.type}</div>
                    </div>
                  )}
                  <span className={clsx("badge", ad.status==="掲載中"?"badge-green":ad.status==="下書き"?"badge-amber":ad.status==="終了"?"badge-coral":"badge-ink")} style={{position:'absolute',top:10,right:10}}>
                    <span className="badge-dot"></span>{ad.status}
                  </span>
                </div>
                <div className="card-body" style={{padding:14}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>{ad.title}</div>
                  <div style={{fontSize:11,color:'var(--ink4)',marginBottom:10,display:'flex',gap:6,flexWrap:'wrap'}}>
                    <span className="mono">{ad.id}</span>
                    <span>·</span>
                    <span style={{color:`var(--${placementColor})`,fontWeight:600}}>{ad.placement}</span>
                    <span>·</span>
                    <span>{ad.type}</span>
                  </div>
                  <div style={{fontSize:11,color:'var(--ink3)',marginBottom:10,lineHeight:1.6}}>
                    {ad.startDate || '開始未定'} 〜 {ad.endDate || '終了未定'}<br/>
                    クリック数: <b style={{color:'var(--ink)'}}>{ad.clicks || 0}</b>
                    {ad.linkUrl && <> · <a href={ad.linkUrl} target="_blank" rel="noopener noreferrer" style={{color:'var(--indigo)',fontSize:11}}>リンク先を開く ↗</a></>}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {window.canDo('ads.update') && (
                      <button className="btn btn-soft btn-sm" style={{flex:1}} onClick={()=>setEditing({mode:'edit', values:ad})}>
                        <Icon n="edit" s={12}/> 編集
                      </button>
                    )}
                    {ad.status !== 'アーカイブ' && window.canDo('ads.delete') && (
                      <button className="btn btn-soft btn-sm" onClick={()=>handleDelete(ad.id, ad.title)} style={{color:'var(--coral)'}}>
                        <Icon n="trash" s={12}/>
                      </button>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {editing && (
        <AdModal
          mode={editing.mode}
          initialValues={editing.values}
          onSave={editing.mode === 'create' ? handleCreate : (payload => handleUpdate(editing.values.id, payload))}
          onCancel={()=>setEditing(null)}
        />
      )}
    </div>
  );
}

// =================================================================
// AUTH GATE — 認証チェック画面
// =================================================================

/**
 * 認証ゲート (信頼ベース)。
 * localStorage に memberId があれば自動ログイン、なければサインイン画面表示。
 *  - 起動時: localStorage を確認 → 自動ログイン or サインイン画面
 *  - サインイン: メンバー一覧から選択 → memberId を保存 → App 表示
 *  - ログアウト: memberId 削除 → サインイン画面に戻る
 */
function AuthGate(){
  const [state, setState] = useStateApp('loading');   // loading / signin / authed / error
  const [user, setUser] = useStateApp(null);
  const [errMsg, setErrMsg] = useStateApp('');

  async function bootstrap() {
    setState('loading');
    setErrMsg('');
    try {
      const storedId = window.getStoredMemberId();
      if (!storedId) {
        // 未ログイン → サインイン画面
        setState('signin');
        return;
      }
      // 自動ログイン: whoami で memberId の有効性を確認
      const data = await window.fetchData('whoami');
      if (data && data.member) {
        setUser(data);
        window.currentUser = data;
        setState('authed');
      } else {
        // memberId が無効 (退会など) → サインイン画面
        window.setStoredMemberId('');
        setState('signin');
      }
    } catch (err) {
      setErrMsg(err.message || String(err));
      setState('error');
    }
  }

  function handleLogin(memberId, userData) {
    window.setStoredMemberId(memberId);
    setUser(userData);
    window.currentUser = userData;
    setState('authed');
  }

  function handleLogout() {
    window.setStoredMemberId('');
    window.currentUser = null;
    setUser(null);
    setState('signin');
  }

  useEffectApp(() => { bootstrap(); }, []);

  if (state === 'loading') {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',flexDirection:'column',gap:14}}>
        <div className="spinner spinner-lg"></div>
        <div style={{fontSize:13,color:'var(--ink4)'}}>読み込み中…</div>
      </div>
    );
  }

  if (state === 'error') {
    return <SigninError message={errMsg} onRetry={bootstrap}/>;
  }

  if (state === 'signin') {
    return <SigninGate onLogin={handleLogin}/>;
  }

  // 認証済み: 通常の App を表示
  return <App user={user} onLogout={handleLogout}/>;
}

/**
 * サインイン画面: Members からドロップダウンで自分を選択。
 */
function SigninGate({onLogin}){
  const [members, setMembers] = useStateApp([]);
  const [loading, setLoading] = useStateApp(true);
  const [selectedId, setSelectedId] = useStateApp('');
  const [submitting, setSubmitting] = useStateApp(false);
  const [error, setError] = useStateApp('');

  useEffectApp(() => {
    async function load() {
      try {
        const data = await window.fetchData('listMembers');
        const active = (Array.isArray(data) ? data : []).filter(m => m.isActive);
        // 部署 + 名前順でソート
        active.sort((a, b) => {
          const da = (a.dept || '').localeCompare(b.dept || '');
          if (da !== 0) return da;
          return (a.name || '').localeCompare(b.name || '');
        });
        setMembers(active);
      } catch (err) {
        setError(err.message || String(err));
      } finally {
        setLoading(false);
      }
    }
    load();
  }, []);

  async function handleSubmit() {
    if (!selectedId) { setError('メンバーを選択してください'); return; }
    setSubmitting(true);
    setError('');
    try {
      // memberId を保存して whoami で確認
      window.setStoredMemberId(selectedId);
      const userData = await window.fetchData('whoami');
      if (!userData || !userData.member) {
        throw new Error('ユーザー情報の取得に失敗しました');
      }
      onLogin(selectedId, userData);
    } catch (err) {
      window.setStoredMemberId('');   // 失敗時はクリア
      setError(err.message || String(err));
      setSubmitting(false);
    }
  }

  // 選択中のメンバー情報
  const selected = members.find(m => m.id === selectedId);

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20}}>
      <div className="card" style={{width:480,maxWidth:'100%'}}>
        <div className="card-body" style={{padding:32}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{width:64,height:64,borderRadius:14,background:'var(--indigo-50)',color:'var(--indigo)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}}>
              <Icon n="user" s={28}/>
            </div>
            <div style={{fontFamily:'var(--serif)',fontSize:24,letterSpacing:'-.02em',marginBottom:6}}>connec+a Console</div>
            <div style={{fontSize:13,color:'var(--ink3)',lineHeight:1.6}}>
              使用するメンバーアカウントを選択してください
            </div>
          </div>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12,marginBottom:14}}>{error}</div>}
          {loading ? (
            <div style={{padding:20,textAlign:'center'}}>
              <Spinner/>
              <div style={{fontSize:12,color:'var(--ink4)',marginTop:8}}>メンバー一覧を読み込み中…</div>
            </div>
          ) : members.length === 0 ? (
            <div style={{padding:14,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:8,fontSize:12,color:'var(--ink3)',lineHeight:1.6}}>
              <b>メンバーが登録されていません。</b><br/>
              Spreadsheet の Members シートに少なくとも1人を登録してください。
            </div>
          ) : (
            <>
              <div className="field">
                <label className="field-label">メンバー <span className="field-req">*</span></label>
                <div className="select-wrap">
                  <select className="input input-lg select" value={selectedId} onChange={e=>setSelectedId(e.target.value)}>
                    <option value="">選択してください</option>
                    {members.map(m => (
                      <option key={m.id} value={m.id}>
                        {m.name}{m.dept && ` (${m.dept})`}{m.role && ` - ${m.role}`}
                      </option>
                    ))}
                  </select>
                </div>
              </div>
              {selected && (
                <div style={{padding:12,background:'var(--bg2)',borderRadius:8,marginBottom:14,display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,borderRadius:10,background:`var(--${selected.accent || 'indigo'}-50)`,color:`var(--${selected.accent || 'indigo'})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:16,fontWeight:700}}>
                    {selected.initial || selected.name.charAt(0)}
                  </div>
                  <div style={{flex:1,fontSize:12,color:'var(--ink3)'}}>
                    <div style={{fontWeight:700,color:'var(--ink)',fontSize:13}}>{selected.name}</div>
                    <div>{selected.dept || '—'} · {selected.role || 'メンバー'}</div>
                  </div>
                </div>
              )}
              <button
                className="btn btn-indigo"
                style={{width:'100%',justifyContent:'center',padding:'12px 16px',fontSize:14}}
                onClick={handleSubmit}
                disabled={!selectedId || submitting}>
                {submitting ? '読み込み中…' : <><Icon n="arrRight" s={14}/> このメンバーで開始</>}
              </button>
              <div style={{fontSize:10.5,color:'var(--ink5)',marginTop:14,lineHeight:1.6,textAlign:'center'}}>
                ※ 選択したメンバーとして全ての操作を行います。次回以降は自動的にこのメンバーでログインします。
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}
