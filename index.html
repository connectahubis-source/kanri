/**
 * 部署 / チーム。connec+a の4イニシアチブ + 横断班構成。
 */
/**
 * Member 作成・編集モーダル。
 */
function MemberModal({mode, initialValues, onSave, onCancel, deptList, departments, existingSubRoles}){
  const init = initialValues || {};
  const safeDeptList = (Array.isArray(deptList) && deptList.length > 0) ? deptList : ["運営本部","IFT班","hub班","community班","order made班","広報班"];
  const safeDepts = Array.isArray(departments) ? departments.filter(d => d.status !== 'archived') : [];
  const ROLES = ['代表', '副代表', 'マネージャー', 'アシマネ', 'メンバー'];

  const [name, setName] = useState(init.name || "");
  const [email, setEmail] = useState(init.email || "");
  const [dept, setDept] = useState(init.dept || safeDeptList[0]);
  const [title, setTitle] = useState(init.title || "メンバー");
  const [role, setRole] = useState(init.role || "メンバー");
  const [initial, setInitial] = useState(init.initial || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // 副所属管理 (兼任)
  // 既存: {id, deptId, deptName, role, isExisting: true}
  // 新規: {tempId, deptId, deptName, role, isNew: true}
  const initialSubRoles = (existingSubRoles || []).map(r => ({
    ...r,
    isExisting: true,
  }));
  const [subRoles, setSubRoles] = useState(initialSubRoles);

  function addSubRole() {
    if (safeDepts.length === 0) {
      setError('副所属を追加するには、まず部署を作成してください');
      return;
    }
    // 主所属と同じ部署はデフォルトで除外
    const available = safeDepts.filter(d => d.name !== dept && !subRoles.some(r => r.deptId === d.id));
    const firstDept = available[0] || safeDepts[0];
    setSubRoles(prev => [...prev, {
      tempId: `temp-${Date.now()}-${Math.random()}`,
      deptId: firstDept.id,
      deptName: firstDept.name,
      role: 'メンバー',
      isNew: true,
    }]);
  }

  function updateSubRole(idx, field, value) {
    setSubRoles(prev => prev.map((r, i) => {
      if (i !== idx) return r;
      const updated = {...r, [field]: value};
      // deptId が変わった時は deptName も同期
      if (field === 'deptId') {
        const d = safeDepts.find(x => x.id === value);
        updated.deptName = d ? d.name : '';
      }
      return updated;
    }));
  }

  function removeSubRole(idx) {
    setSubRoles(prev => prev.filter((_, i) => i !== idx));
  }

  async function handleSubmit() {
    if (!name.trim()) { setError("氏名は必須です"); return; }
    if (!email.trim()) { setError("メールは必須です"); return; }
    // 副所属の重複チェック
    const deptIds = subRoles.map(r => r.deptId);
    if (new Set(deptIds).size !== deptIds.length) {
      setError('同じ部署を兼任に2回以上指定することはできません');
      return;
    }
    // 副所属が主所属と同じでないかチェック
    const conflictDept = subRoles.find(r => r.deptName === dept);
    if (conflictDept) {
      setError(`兼任「${conflictDept.deptName}」は主所属と同じです。削除してください`);
      return;
    }
    setSaving(true);
    setError(null);
    try {
      // 副所属の差分を計算 (作成時は全件作成、編集時は既存と比較)
      const subRolesPayload = {
        toCreate: subRoles.filter(r => r.isNew).map(r => ({
          deptId: r.deptId,
          role: r.role,
          note: r.note || '',
        })),
        toDelete: initialSubRoles
          .filter(orig => !subRoles.some(curr => curr.id === orig.id))
          .map(r => r.id),
      };
      await onSave({
        name: name.trim(),
        email: email.trim(),
        dept, title, role,
        initial: initial.trim(),
      }, subRolesPayload);
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:580,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="user" s={16}/> {mode === "create" ? "メンバーを追加" : "メンバーを編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">氏名 <span className="field-req">*</span></label>
              <input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="例: 山田 太郎"/>
            </div>
            <div className="field">
              <label className="field-label">イニシャル</label>
              <input className="input" value={initial} onChange={e=>setInitial(e.target.value)} maxLength={3} placeholder="自動生成"/>
              <div className="field-hint">空欄で氏名から自動生成</div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">メール <span className="field-req">*</span></label>
            <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="example@connecta.jp"/>
            <div className="field-hint">在籍中メンバーで重複不可、ログイン時にこのIDで識別</div>
          </div>

          {/* 主所属セクション */}
          <div style={{borderTop:'1px solid var(--line)',paddingTop:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',letterSpacing:'.05em',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              <Icon n="star" s={12}/> 主所属 (1つ必須)
            </div>
            <div className="grid-2" style={{gap:14}}>
              <div className="field">
                <label className="field-label">部署 <span className="field-req">*</span></label>
                <div className="select-wrap">
                  <select className="input select" value={dept} onChange={e=>setDept(e.target.value)}>
                    {safeDeptList.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
              </div>
              <div className="field">
                <label className="field-label">役職 (表示用)</label>
                <input className="input" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 代表 / 担当 / メンバー"/>
                <div className="field-hint">自由記述、表示用のラベル</div>
              </div>
            </div>
            <div className="field">
              <label className="field-label">ロール (権限) <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={role} onChange={e=>setRole(e.target.value)}>
                  {ROLES.map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <div className="field-hint">代表 ＞ 副代表 ＞ マネージャー ＞ アシマネ ＞ メンバー の順で権限が高い</div>
            </div>
          </div>

          {/* 兼任セクション */}
          <div style={{borderTop:'1px solid var(--line)',paddingTop:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--ink3)',letterSpacing:'.05em',display:'flex',alignItems:'center',gap:6}}>
                <Icon n="layers" s={12}/> 兼任 (副所属) {subRoles.length > 0 && <span style={{color:'var(--ink5)'}}>({subRoles.length})</span>}
              </div>
              <button className="btn btn-soft btn-sm" onClick={addSubRole} disabled={safeDepts.length === 0}>
                <Icon n="plus" s={11}/> 兼任を追加
              </button>
            </div>
            {subRoles.length === 0 ? (
              <div style={{padding:14,background:'var(--bg2)',borderRadius:6,fontSize:11.5,color:'var(--ink5)',textAlign:'center',lineHeight:1.6}}>
                兼任なし。複数部署で異なるロールを持つ場合は「兼任を追加」をクリック。
              </div>
            ) : (
              <div className="stack" style={{gap:8}}>
                {subRoles.map((r, idx) => {
                  const d = safeDepts.find(x => x.id === r.deptId);
                  const accent = d ? d.color : 'ink';
                  return (
                    <div key={r.id || r.tempId} style={{display:'flex',gap:8,alignItems:'center',padding:8,background:'var(--bg2)',borderRadius:6,borderLeft:`3px solid var(--${accent})`}}>
                      <div className="select-wrap" style={{flex:2,marginBottom:0}}>
                        <select className="input select" style={{padding:'6px 24px 6px 8px',fontSize:12,height:32}}
                          value={r.deptId}
                          onChange={e=>updateSubRole(idx, 'deptId', e.target.value)}>
                          {safeDepts.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
                        </select>
                      </div>
                      <div className="select-wrap" style={{flex:1,marginBottom:0}}>
                        <select className="input select" style={{padding:'6px 24px 6px 8px',fontSize:12,height:32}}
                          value={r.role}
                          onChange={e=>updateSubRole(idx, 'role', e.target.value)}>
                          {ROLES.map(role => <option key={role} value={role}>{role}</option>)}
                        </select>
                      </div>
                      <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>removeSubRole(idx)} title="削除" style={{color:'var(--coral)'}}>
                        <Icon n="x" s={11}/>
                      </button>
                    </div>
                  );
                })}
              </div>
            )}
            <div className="field-hint" style={{marginTop:6}}>
              ※ 最高ロールが権限判定に使われます。例: 主所属がメンバーでも、IFT班マネージャーを兼任していれば「マネージャー」相当の権限。
            </div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '追加' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageDepartments(){
  const [members, setMembers] = useState([]);
  const [departments, setDepartments] = useState([]);   // 動的取得
  const [memberRoles, setMemberRoles] = useState([]);   // 兼任 (副所属) 全件
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("active");
  const [query, setQuery] = useState("");
  const [deptFilter, setDeptFilter] = useState("all");
  const [modalMode, setModalMode] = useState(null);
  const [editingM, setEditingM] = useState(null);
  // 部署 CRUD 用
  const [tab, setTab] = useState("members");   // departments / members
  const [editingDept, setEditingDept] = useState(null);   // {mode, values}

  async function fetchAll() {
    setLoading(true);
    setError(null);
    try {
      const [mems, depts, roles] = await Promise.all([
        window.fetchData('listMembers'),
        window.fetchData('listDepartments'),
        window.fetchData('listMemberRoles'),
      ]);
      setMembers(Array.isArray(mems) ? mems : []);
      setDepartments(Array.isArray(depts) ? depts : []);
      setMemberRoles(Array.isArray(roles) ? roles : []);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchAll(); }, []);

  async function handleSave(fields, subRolesPayload) {
    let memberId = editingM ? editingM.id : null;
    try {
      // 1. メンバー本体の作成/更新
      if (modalMode === "create") {
        const result = await window.postData('createMember', fields);
        memberId = (result && result.member && result.member.id) || (result && result.memberId);
        if (!memberId) {
          // 念のためレスポンスから取れない場合は再フェッチ
          window.toast.warn('メンバーは作成されましたが、副所属の同期はスキップされました');
        }
      } else if (modalMode === "edit" && editingM) {
        await window.postData('updateMember', { memberId: editingM.id, fields });
        memberId = editingM.id;
      }

      // 2. 副所属 (MemberRoles) の差分 CRUD
      if (memberId && subRolesPayload) {
        // 削除
        if (Array.isArray(subRolesPayload.toDelete)) {
          for (const roleId of subRolesPayload.toDelete) {
            try {
              await window.postData('deleteMemberRole', { roleId });
            } catch (e) {
              console.warn(`副所属削除失敗 (${roleId}):`, e);
            }
          }
        }
        // 作成
        if (Array.isArray(subRolesPayload.toCreate)) {
          for (const r of subRolesPayload.toCreate) {
            try {
              await window.postData('createMemberRole', {
                memberId,
                deptId: r.deptId,
                role: r.role,
                note: r.note || '',
              });
            } catch (e) {
              console.warn(`副所属作成失敗 (${r.deptId}):`, e);
              window.toast.error(`副所属の追加に失敗: ${e.message}`);
            }
          }
        }
      }

      window.toast.success(modalMode === "create" ? 'メンバーを追加しました' : 'メンバーを更新しました');
      setModalMode(null);
      setEditingM(null);
      await fetchAll();
    } catch (err) {
      window.toast.error('保存に失敗: ' + err.message);
      throw err;   // モーダル側で saving 解除
    }
  }

  async function handleDelete(memberId) {
    const m = members.find(x => x.id === memberId);
    if (!m) return;
    if (!await window.confirmDialog({title:`「${m.name}」を退会扱いにしますか?`, body:'行は残り、退会日がセットされます。後で復元できます。', danger:true, confirmLabel:'退会'})) return;
    setMembers(prev => prev.map(x => x.id === memberId ? {...x, isActive: false, leftAt: 'たった今'} : x));
    try {
      await window.postData('deleteMember', { memberId });
    } catch (err) {
      window.location.reload();
    }
  }

  async function handleRestore(memberId) {
    const m = members.find(x => x.id === memberId);
    if (!m) return;
    if (!await window.confirmDialog({title:`「${m.name}」を在籍中に戻しますか?`, body:'退会日がクリアされ、在籍メンバーに戻ります。'})) return;
    setMembers(prev => prev.map(x => x.id === memberId ? {...x, isActive: true, leftAt: ''} : x));
    try {
      await window.postData('restoreMember', { memberId });
    } catch (err) {
      window.location.reload();
    }
  }

  // メンバーごとの副所属を計算 (兼任)
  function getSubRolesFor(memberId) {
    return memberRoles.filter(r => r.memberId === memberId);
  }

  // フィルタ (主所属 + 副所属どちらでも引っかかる)
  const filtered = members.filter(m => {
    if (filter === "active" && !m.isActive) return false;
    if (filter === "left" && m.isActive) return false;
    if (deptFilter !== "all") {
      const subDepts = getSubRolesFor(m.id).map(r => r.deptName);
      const allDepts = [m.dept].concat(subDepts);
      if (!allDepts.includes(deptFilter)) return false;
    }
    if (query) {
      const q = query.toLowerCase();
      return (m.name || '').toLowerCase().includes(q)
          || (m.email || '').toLowerCase().includes(q)
          || (m.id || '').toLowerCase().includes(q);
    }
    return true;
  });

  // 部署別集計 (在籍中のみ、主所属 + 副所属の両方をカウント)
  const activeDepts = departments.filter(d => d.status !== 'archived');
  const deptList = activeDepts.map(d => d.name);
  const deptStats = activeDepts.map(d => {
    // 主所属
    const primary = members.filter(m => m.dept === d.name && m.isActive);
    // 副所属 (主所属で既にカウントされていない人のみ)
    const primaryIds = primary.map(m => m.id);
    const subMemberIds = memberRoles
      .filter(r => r.deptName === d.name && !primaryIds.includes(r.memberId))
      .map(r => r.memberId);
    const subMembers = members.filter(m => subMemberIds.includes(m.id) && m.isActive);
    const dm = primary.concat(subMembers);
    const lead = dm.find(m => m.title === "リーダー" || m.title === "代表" || m.title === "副代表");
    return {
      ...d,
      count: dm.length,
      primaryCount: primary.length,
      subCount: subMembers.length,
      members: dm,
      lead: lead ? lead.name : '未設定',
      accent: d.color || 'indigo',
    };
  });

  // ========== 部署 CRUD ハンドラ ==========

  async function handleDeptCreate(payload) {
    try {
      await window.postData('createDepartment', payload);
      window.toast.success('部署を作成しました');
      setEditingDept(null);
      await fetchAll();
    } catch (err) {
      window.toast.error('作成に失敗: ' + err.message);
    }
  }

  async function handleDeptUpdate(deptId, payload) {
    try {
      await window.postData('updateDepartment', {deptId, fields: payload});
      window.toast.success('部署を更新しました');
      setEditingDept(null);
      await fetchAll();
    } catch (err) {
      window.toast.error('更新に失敗: ' + err.message);
    }
  }

  async function handleDeptDelete(deptId, name, memberCount) {
    if (memberCount > 0) {
      window.toast.error(`この部署には ${memberCount} 名の在籍メンバーがいます。先に別の部署に移動してください。`);
      return;
    }
    if (!await window.confirmDialog({
      title: `「${name}」をアーカイブしますか?`,
      body: 'メンバーが所属していない部署のみアーカイブできます。後で復元できます。',
      danger: true,
      confirmLabel: 'アーカイブ',
    })) return;
    try {
      await window.postData('deleteDepartment', {deptId});
      window.toast.success('アーカイブしました');
      await fetchAll();
    } catch (err) {
      window.toast.error('失敗: ' + err.message);
    }
  }

  const activeCount = members.filter(m => m.isActive).length;
  const leftCount = members.filter(m => !m.isActive).length;

  return (
    <div className="page" data-page="departments">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>部署 / チーム</span></div>
          <h1>部署 / <i>チーム</i></h1>
          <div className="ph-sub">運営メンバーの一元管理。部署、役職、ロール (権限) を管理。</div>
        </div>
        <div className="ph-right">
          {window.canDo('departments.create') && (
            <button className="btn btn-soft" onClick={()=>setEditingDept({mode:'create', values:{}})}>
              <Icon n="layers" s={14}/> 部署を追加
            </button>
          )}
          {window.canDo('members.create') && (
            <button className="btn btn-indigo" onClick={()=>{setEditingM(null); setModalMode("create");}}>
              <Icon n="plus" s={14}/> メンバーを追加
            </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <MiniStat label="在籍メンバー" value={loading ? '…' : String(activeCount)} sub="" icon="users" color="indigo"/>
        <MiniStat label="退会済み" value={loading ? '…' : String(leftCount)} sub="" icon="user" color="amber"/>
        <MiniStat label="部署数" value={String(deptList.length)} sub="" icon="building" color="violet"/>
        <MiniStat label="ロール種別" value="5" sub="" icon="lock" color="coral"/>
      </div>

      {/* 部署別カード (在籍中のみ表示) */}
      <div className="grid-3">
        {deptStats.map(d => (
          <div key={d.id || d.name} className="card">
            <div style={{padding:16,display:'flex',gap:12,alignItems:'center',borderBottom:'1px solid var(--line)'}}>
              <div style={{width:44,height:44,borderRadius:10,background:`var(--${d.accent}-50)`,color:`var(--${d.accent})`,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:22}}>{d.abbr ? d.abbr.charAt(0) : d.name.charAt(0)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-.015em',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{d.name}</div>
                <div style={{fontSize:11,color:'var(--ink4)'}}>{d.count}名 在籍 {d.abbr && `· ${d.abbr}`}</div>
              </div>
              <div style={{display:'flex',gap:4}}>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>setDeptFilter(d.name)} title={`${d.name}でフィルタ`}>
                  <Icon n="filter" s={12}/>
                </button>
                {window.canDo('departments.update') && (
                  <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>setEditingDept({mode:'edit', values:d})} title="編集">
                    <Icon n="edit" s={12}/>
                  </button>
                )}
                {window.canDo('departments.delete') && (
                  <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>handleDeptDelete(d.id, d.name, d.count)} title="アーカイブ" style={{color:'var(--coral)'}}>
                    <Icon n="trash" s={12}/>
                  </button>
                )}
              </div>
            </div>
            <div className="card-body">
              <div className="row between mb8" style={{fontSize:11}}>
                <span style={{color:'var(--ink4)'}}>リーダー</span>
                <span style={{fontWeight:600}}>{d.lead}</span>
              </div>
              <div style={{display:'flex',marginTop:8}}>
                {d.members.slice(0, 5).map((m, i) => (
                  <div key={m.id} className={`avatar sm ${m.accent}`} style={{marginLeft:i?-6:0,border:'2px solid white'}}>
                    {m.initial}
                  </div>
                ))}
                {d.count > 5 && (
                  <div className="avatar sm" style={{marginLeft:-6,border:'2px solid white',background:'var(--bg3)',color:'var(--ink3)'}}>+{d.count-5}</div>
                )}
                {d.count === 0 && (
                  <span style={{fontSize:11,color:'var(--ink5)'}}>(0名)</span>
                )}
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* メンバー一覧テーブル */}
      <div className="card mt16">
        <div className="card-head">
          <div className="card-title"><Icon n="users" s={16}/> メンバー一覧</div>
          <div className="row" style={{gap:6}}>
            {[["active","在籍",activeCount],["left","退会",leftCount],["all","全員",members.length]].map(([k,l,c]) => (
              <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>
                {l}<span style={{opacity:.6,marginLeft:4}}>{c}</span>
              </span>
            ))}
          </div>
        </div>
        <div className="row" style={{padding:'10px 14px',gap:8,borderBottom:'1px solid var(--line)'}}>
          <div className="search-bar" style={{flex:1,maxWidth:280}}>
            <Icon n="search" s={14}/><input className="input" placeholder="名前・メール..." value={query} onChange={e=>setQuery(e.target.value)}/>
          </div>
          <div className="select-wrap" style={{minWidth:160}}>
            <select className="input select" value={deptFilter} onChange={e=>setDeptFilter(e.target.value)}>
              <option value="all">すべての部署</option>
              {deptList.map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{flex:1}}></div>
          <span style={{fontSize:11,color:'var(--ink4)',padding:'8px 0'}}>{loading ? '...' : `${filtered.length} 件`}</span>
        </div>
        {!loading && filtered.length === 0 ? (
          <div className="empty" style={{padding:'40px 20px'}}>
            <Icon n="users" s={28}/>
            <div>{members.length === 0 ? 'メンバーがまだいません' : '該当するメンバーがいません'}</div>
            <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>{members.length === 0 ? '右上の「メンバーを追加」ボタンから登録できます' : '別のフィルタでお試しください'}</div>
          </div>
        ) : (
          <table className="tbl">
            <thead><tr>
              <th style={{width:32}}></th>
              <th>メンバー</th><th>部署</th><th>役職</th><th>ロール</th><th>入会日</th><th>状態</th><th></th>
            </tr></thead>
            <tbody>
              {filtered.map(m => {
                const subRoles = getSubRolesFor(m.id);
                return (
                <tr key={m.id} style={{opacity: m.isActive ? 1 : 0.5}}>
                  <td><div className={`avatar sm ${m.accent}`}>{m.initial}</div></td>
                  <td>
                    <div style={{fontWeight:600}}>{m.name}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{m.email}</div>
                  </td>
                  <td>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      <span className={`badge badge-${m.accent}`} title="主所属">{m.dept}</span>
                      {subRoles.length > 0 && (
                        <div style={{display:'flex',flexWrap:'wrap',gap:3}}>
                          {subRoles.map(r => {
                            const dept = departments.find(d => d.id === r.deptId);
                            const accent = dept ? dept.color : 'ink';
                            return (
                              <span key={r.id}
                                className={`badge badge-${accent}`}
                                style={{fontSize:9.5,opacity:0.85}}
                                title={`兼任: ${r.deptName} (${r.role})`}>
                                <Icon n="layers" s={8}/> {r.deptName}
                              </span>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </td>
                  <td style={{fontSize:12,fontWeight:500}}>{m.title}</td>
                  <td><span className={clsx("badge",
                      m.role==="代表"?"badge-coral"
                      : m.role==="副代表"?"badge-coral"
                      : m.role==="マネージャー"?"badge-indigo"
                      : m.role==="アシマネ"?"badge-violet"
                      : m.role==="オーナー"?"badge-coral"
                      : m.role==="管理者"?"badge-indigo"
                      : m.role==="リーダー"?"badge-violet"
                      : m.role==="編集者"?"badge-teal"
                      : "badge-ink")}>{m.role}</span></td>
                  <td className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{m.joinedAt || '—'}</td>
                  <td>
                    {m.isActive ? (

/**
 * 部署作成・編集モーダル。
 */
function DepartmentModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [name, setName] = useState(init.name || "");
  const [abbr, setAbbr] = useState(init.abbr || "");
  const [desc, setDesc] = useState(init.desc || "");
  const [color, setColor] = useState(init.color || "indigo");
  const [order, setOrder] = useState(init.order || "");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!name.trim()) { setError("部署名は必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        name: name.trim(),
        abbr: abbr.trim(),
        desc: desc.trim(),
        color,
        order: order ? Number(order) : undefined,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="layers" s={16}/> {mode === "create" ? "部署を追加" : "部署を編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">部署名 <span className="field-req">*</span></label>
            <input className="input input-lg" value={name} onChange={e=>setName(e.target.value)} placeholder="例: IFT班 / 広報班 / 新規プロジェクト班"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">略称</label>
              <input className="input" value={abbr} onChange={e=>setAbbr(e.target.value)} placeholder="例: IFT, PR"/>
              <div className="field-hint">アバター表示・チャンネル名等で使用</div>
            </div>
            <div className="field">
              <label className="field-label">表示順</label>
              <input className="input" type="number" value={order} onChange={e=>setOrder(e.target.value)} placeholder="自動 (最後に追加)"/>
              <div className="field-hint">小さいほど上に表示</div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">説明</label>
            <input className="input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="この部署の役割・目的"/>
          </div>
          <div className="field">
            <label className="field-label">カラー</label>
            <div className="select-wrap">
              <select className="input select" value={color} onChange={e=>setColor(e.target.value)}>
                <option value="indigo">Indigo (青)</option>
                <option value="coral">Coral (赤)</option>
                <option value="teal">Teal (青緑)</option>
                <option value="violet">Violet (紫)</option>
                <option value="amber">Amber (黄)</option>
                <option value="green">Green (緑)</option>
              </select>

            <div style={{padding:10,background:'var(--bg2)',borderRadius:6,fontSize:11,color:'var(--ink4)',lineHeight:1.6}}>

    </div>
  );
}

<script type="text/babel" data-presets="react">

// -------------------- PageNotifications --------------------

function PageNotifications(){
  const [notifs, setNotifs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listNotifications');
        if (!cancelled) setNotifs(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 既読/未読トグル (通知をクリックで既読に)
  async function toggleRead(notifId) {
    const n = notifs.find(x => x.id === notifId);
    if (!n) return;
    setNotifs(prev => prev.map(x => x.id === notifId ? {...x, unread: !x.unread} : x));
    try {
      await window.postData('toggleNotification', { notifId });
    } catch (err) {
      setNotifs(prev => prev.map(x => x.id === notifId ? {...x, unread: n.unread} : x));
    }
  }

  // すべて既読にする (1件ずつ APIコール)
  async function markAllRead() {
    const unreadOnes = notifs.filter(n => n.unread);
    if (unreadOnes.length === 0) return;
    if (!await window.confirmDialog({title:`${unreadOnes.length} 件の未読通知をすべて既読にしますか?`, body:'この操作は元に戻せません。'})) return;

    // 楽観的UI
    setNotifs(prev => prev.map(x => ({...x, unread: false})));

    try {
      // 並列で実行
      await Promise.all(unreadOnes.map(n => window.postData('toggleNotification', { notifId: n.id })));
    } catch (err) {
      window.location.reload();
    }
  }

  // 削除
  async function handleDelete(notifId) {
    setNotifs(prev => prev.filter(x => x.id !== notifId));
    try {
      await window.postData('deleteNotification', { notifId });
    } catch (err) {
      window.location.reload();
    }
  }

  const filtered = notifs.filter(n => {
    if (filter === "all") return true;
    if (filter === "unread") return n.unread;
    return n.type === filter;
  });

  const tabs = [
    ["all",     "すべて",   notifs.length],
    ["unread",  "未読",     notifs.filter(n => n.unread).length],
    ["payment", "決済",     notifs.filter(n => n.type === "payment").length],
    ["reg",     "申込",     notifs.filter(n => n.type === "reg").length],
    ["mail",    "配信",     notifs.filter(n => n.type === "mail").length],
    ["task",    "タスク",   notifs.filter(n => n.type === "task").length],
    ["warn",    "警告",     notifs.filter(n => n.type === "warn").length],
    ["system",  "システム", notifs.filter(n => n.type === "system").length],
  ];

  return (
    <div className="page" data-page="notifications">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>運営</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>通知センター</span></div>
          <h1>通知 <i>センター</i></h1>
          <div className="ph-sub">申込・決済・タスク・メンション。すべての運営アクティビティを時系列で。</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" onClick={markAllRead} disabled={notifs.filter(n=>n.unread).length === 0}>
            <Icon n="check" s={14}/> すべて既読に
          </button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="card">
          <div className="card-head" style={{padding:"10px 14px"}}>
            <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
              {tabs.map(([k, l, c]) => (
                <button key={k} onClick={()=>setFilter(k)} className={clsx("chip", filter===k && "on")}>
                  {l}<span style={{opacity:.6,marginLeft:4}}>{c}</span>
                </button>
              ))}
            </div>
          </div>
          <div className="card-body" style={{padding:10}}>
            {filtered.length === 0 ? (
              <div className="empty">
                <Icon n="bell" s={28}/>
                <div>{notifs.length === 0 ? '通知はまだありません' : '該当する通知がありません'}</div>
                <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>運営アクティビティが発生するとここに表示されます</div>
              </div>
            ) : (
              <div className="notif-list">
                {filtered.map(n => (
                  <div key={n.id} className={clsx("notif", n.unread && "unread")}
                    style={{cursor:'pointer'}}
                    onClick={()=>toggleRead(n.id)}>
                    <div className="notif-icon" style={{background:`var(--${n.color}-50)`,color:`var(--${n.color})`}}>
                      <Icon n={n.icon} s={16}/>
                    </div>
                    <div>
                      <div className="notif-title">{n.title}</div>
                      <div className="notif-body">{n.body}</div>
                    </div>
                    <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                      <div className="notif-time">{n.time}</div>
                      {n.unread && <div className="notif-unread-dot"></div>}
                      {window.canDo('notifications.delete') && (
                        <button className="btn btn-soft btn-sm btn-icon" title="削除" onClick={(ev)=>{ev.stopPropagation(); handleDelete(n.id);}}>
                          <Icon n="trash" s={11}/>
                        </button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="info" s={16}/> 通知について</div></div>
            <div className="card-body" style={{fontSize:12,color:'var(--ink3)',lineHeight:1.6}}>
              通知の主な種類:
              <ul style={{marginTop:8,paddingLeft:18,fontSize:11,lineHeight:1.7}}>
                <li>申込が入ったら自動通知</li>
                <li>決済成功/失敗の自動通知</li>
                <li>イベント満員時の自動通知</li>
                <li>開催48h前の自動リマインド</li>
              </ul>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="gear" s={16}/> 通知チャネル</div></div>
            <div className="card-body" style={{padding:0}}>
              {[
                {n:"メール",   d:"connecta.official@gmail.com"},
                {n:"Slack",    d:"#ops-connecta"},
                {n:"LINE通知", d:"運営本部 LINE グループ"},
                {n:"Webhook",  d:"未設定"},
              ].map(c => (
                <div key={c.n} style={{padding:"12px 16px",borderTop:"1px solid var(--line)",display:'flex',alignItems:'center',gap:10,opacity:0.5}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:12.5}}>{c.n}</div>
                    <div style={{fontSize:11,color:'var(--ink4)'}}>{c.d}</div>
                  </div>
                  <span className="badge badge-ink" style={{fontSize:9}}>準備中</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/**
 * イベント作成 5ステップフォーム。
 * 各ステップの内容: 1)基本情報, 2)日程・会場, 3)申込設定, 4)決済, 5)公開
 * Step 1 のみ詳細実装、他は EmptyState で「準備中」。
 */
// =================================================================
// SessionEditor — 複数セッション編集UI (Phase 5新-Sessions)
// =================================================================
// EventCreate Step2 で複数セッション形式を選んだ時に使うエディタ。
// セッション1つ分のフォーム。
function SessionEditor({session, index, onChange, onDelete, zoomHistory}) {
  function update(key, value) {
    onChange({...session, [key]: value});
  }

  return (
    <div style={{
      border:'1px solid var(--line)', borderRadius:8, padding:14,
      background:'white', position:'relative',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,paddingBottom:8,borderBottom:'1px dashed var(--line)'}}>
        <div style={{fontSize:13,fontWeight:700,color:'var(--indigo)'}}>
          <Icon n="layers" s={13}/> セッション {index + 1}
        </div>
        <button type="button"
          onClick={onDelete}
          className="btn btn-ghost btn-sm btn-icon"
          title="このセッションを削除"
          style={{color:'var(--coral)'}}>
          <Icon n="trash" s={12}/>
        </button>
      </div>

      <div className="stack" style={{gap:10}}>
        <div className="field">
          <label className="field-label" style={{fontSize:11}}>セッション名</label>
          <IMEInput className="input" value={session.name || ''} onChange={e=>update('name', e.target.value)} placeholder={`例: 鎌倉散策 / Day ${index + 1}`}/>
        </div>

        <div className="grid-2">
          <div className="field">
            <label className="field-label" style={{fontSize:11}}>日付</label>
            <input className="input" type="date" value={session.date || ''} onChange={e=>update('date', e.target.value)}/>
          </div>
          <div className="grid-2">
            <div className="field">
              <label className="field-label" style={{fontSize:11}}>開始</label>
              <input className="input" type="time" value={session.startTime || ''} onChange={e=>update('startTime', e.target.value)}/>
            </div>
            <div className="field">
              <label className="field-label" style={{fontSize:11}}>終了</label>
              <input className="input" type="time" value={session.endTime || ''} onChange={e=>update('endTime', e.target.value)}/>
            </div>
          </div>
        </div>

        {/* オンライン トグル */}
        <div style={{padding:'8px 10px',background:session.online ? 'var(--teal-50)' : 'var(--bg2)',border:`1px solid ${session.online ? 'var(--teal)' : 'var(--line)'}`,borderRadius:6,display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}
          onClick={() => {
            const next = !session.online;
            const updated = {...session, online: next};
            if (next && !session.venue) updated.venue = 'オンライン';
            if (!next && session.venue === 'オンライン') updated.venue = '';
            onChange(updated);
          }}>
          <input type="checkbox" checked={!!session.online} onChange={()=>{}} style={{width:14,height:14,cursor:'pointer'}}/>
          <span style={{fontSize:11,fontWeight:600,color:session.online ? 'var(--teal)' : 'var(--ink2)'}}>
            <Icon n="globe" s={11}/> オンライン開催
          </span>
        </div>

        {!session.online ? (
          <>
            <div className="field">
              <label className="field-label" style={{fontSize:11}}>会場名</label>
              <IMEInput className="input" value={session.venue || ''} onChange={e=>update('venue', e.target.value)} placeholder="例: 鎌倉駅西口"/>
            </div>
            <div className="field">
              <label className="field-label" style={{fontSize:11}}>住所</label>
              <IMEInput className="input" value={session.address || ''} onChange={e=>update('address', e.target.value)} placeholder="例: 神奈川県鎌倉市御成町1-15"/>
            </div>
            {(session.venue || session.address) && (
              <EventMapEmbed venue={session.venue} address={session.address} height={160} mode="search"/>
            )}
          </>
        ) : (
          <div className="field">
            <label className="field-label" style={{fontSize:11}}>Zoom URL</label>
            <IMEInput className="input" value={session.zoomURL || ''} onChange={e=>update('zoomURL', e.target.value)} placeholder="https://zoom.us/j/..."/>
            {zoomHistory && zoomHistory.length > 0 && (
              <div style={{marginTop:6,display:'flex',gap:4,flexWrap:'wrap'}}>
                {zoomHistory.slice(0, 3).map(z => (
                  <button key={z.id} type="button"
                    onClick={() => update('zoomURL', z.url)}
                    style={{padding:'3px 8px',fontSize:10,border:'1px solid var(--line)',borderRadius:4,background:'white',cursor:'pointer',color:'var(--ink3)'}}
                    title={z.url}>
                    過去のURL #{z.id.slice(-3)}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}

        <div className="grid-2">
          <div className="field">
            <label className="field-label" style={{fontSize:11}}>個別定員</label>
            <input className="input" type="number" min="0" value={session.capacity || ''} onChange={e=>update('capacity', e.target.value)} placeholder="0=無制限"/>
          </div>
          <div className="field">
            <label className="field-label" style={{fontSize:11}}>個別参加費 (円)</label>
            <input className="input" type="number" min="0" value={session.fee || ''} onChange={e=>update('fee', e.target.value)} placeholder="0=無料"/>
          </div>
        </div>

        <div className="field">
          <label className="field-label" style={{fontSize:11}}>備考</label>
          <IMEInput className="input" value={session.notes || ''} onChange={e=>update('notes', e.target.value)} placeholder="任意 / 持ち物、注意事項など"/>
        </div>
      </div>
    </div>
  );
}

function PageEventCreate(){
  // URL hash から編集対象 ID を取得 (例: #event-create?id=E-2601)
  const editId = (() => {
    const hash = window.location.hash || '';
    const m = hash.match(/[?&]id=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  })();
  const isEditMode = !!editId;

  // フォーム state
  const [step, setStep] = useState(1);
  const [title, setTitle] = useState("");
  const [category, setCategory] = useState("IFT");
  const [summary, setSummary] = useState("");
  // 開催形式 (Phase 2: single / multi)
  const [format, setFormat] = useState("single");
  const [sessions, setSessions] = useState([]);   // 複数セッション時のリスト
  // 日程・会場
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [endDate, setEndDate] = useState("");
  const [endTime, setEndTime] = useState("");
  const [venue, setVenue] = useState("");
  const [address, setAddress] = useState("");   // 住所 (Map連携用、次回 Phase で活用)
  // 申込設定
  const [capacity, setCapacity] = useState("");
  const [regOpenDate, setRegOpenDate] = useState("");
  const [regCloseDate, setRegCloseDate] = useState("");
  const [requirements, setRequirements] = useState("");
  const [customQuestions, setCustomQuestions] = useState("");
  // 決済
  const [fee, setFee] = useState("");
  const [paymentMethods, setPaymentMethods] = useState(["当日現金"]);   // 配列に変更
  const [earlyBird, setEarlyBird] = useState("");
  const [cancelPolicy, setCancelPolicy] = useState("");
  // オンライン対応
  const [online, setOnline] = useState(false);
  const [zoomURL, setZoomURL] = useState("");
  const [zoomHistory, setZoomHistory] = useState([]);   // 過去のZoomリンク履歴
  // 公開
  const [status, setStatus] = useState("下書き");
  const [snsCopy, setSnsCopy] = useState("");

  // 通信state
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // カテゴリ別アクセント色
  const accentMap = {"IFT":"indigo","community":"teal","hub":"violet","order made":"amber"};
  const accent = accentMap[category] || "indigo";

  // 編集モードの場合、既存データを取得して入力欄を埋める
  useEffect(() => {
    if (!isEditMode) return;
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const ev = await window.fetchData('getEvent', { eventId: editId });
        if (cancelled) return;
        if (!ev) {
          setError(`イベント ${editId} が見つかりません`);
          return;
        }
        setTitle(ev.title || "");
        setCategory(ev.category || "IFT");
        setSummary(ev.summary || "");
        setDate(ev.date || "");
        setTime(ev.time || "");
        setEndDate(ev.endDate || "");
        setEndTime(ev.endTime || "");
        setVenue(ev.venue || "");
        setAddress(ev.address || "");
        setCapacity(ev.capacity ? String(ev.capacity) : "");
        setRegOpenDate(ev.regOpenDate || "");
        setRegCloseDate(ev.regCloseDate || "");
        setRequirements(ev.requirements || "");
        setCustomQuestions(ev.customQuestions || "");
        setFee(ev.fee ? String(ev.fee) : "");
        setEarlyBird(ev.earlyBird || "");
        setCancelPolicy(ev.cancelPolicy || "");
        setStatus(ev.status || "下書き");
        setSnsCopy(ev.snsCopy || "");
        setOnline(ev.online === true || ev.online === 'true');
        setZoomURL(ev.zoomURL || "");
        setFormat(ev.format || 'single');
        // 支払い方法 (カンマ区切り → 配列に変換)
        if (ev.paymentMethod) {
          const methods = ev.paymentMethod.split(',').map(s => s.trim()).filter(Boolean);
          setPaymentMethods(methods.length > 0 ? methods : ["当日現金"]);
        }
        // 複数セッション時はセッションリストも読み込み
        if (ev.format === 'multi') {
          try {
            const sessList = await window.fetchData('listEventSessions', {eventId: editId});
            if (!cancelled) setSessions(Array.isArray(sessList) ? sessList : []);
          } catch (e) {
            // サイレント
          }
        }
      } catch (err) {
        if (!cancelled) setError('読み込みエラー: ' + err.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, [editId]);

  // Zoom URL 履歴の読み込み (オンラインイベント時に過去のリンクから選択できるように)
  useEffect(() => {
    let cancelled = false;
    async function loadZoom() {
      try {
        const list = await window.fetchData('listZoomLinks');
        if (!cancelled) setZoomHistory(Array.isArray(list) ? list : []);
      } catch (e) {
        // サイレント
      }
    }
    loadZoom();
    return () => { cancelled = true; };
  }, []);

  // 保存ハンドラ
  async function handleSave(publishStatus) {
    if (!title.trim()) {
      window.toast.error('イベント名は必須です');
      return;
    }
    setSaving(true);
    setError(null);

    const fields = {
      title: title.trim(),
      category: category,
      accent: accent,
      summary: summary || '',
      date: date || '',
      time: time || '',
      endDate: endDate || '',
      endTime: endTime || '',
      venue: venue || '',
      address: address || '',
      capacity: Number(capacity) || 0,
      regOpenDate: regOpenDate || '',
      regCloseDate: regCloseDate || '',
      requirements: requirements || '',
      customQuestions: customQuestions || '',
      fee: Number(fee) || 0,
      paymentMethod: paymentMethods.join(', '),   // 配列 → カンマ区切り
      earlyBird: earlyBird || '',
      cancelPolicy: cancelPolicy || '',
      snsCopy: snsCopy || '',
      online: online,
      zoomURL: online ? (zoomURL || '') : '',
      format: format,
      status: publishStatus || status || '下書き',
    };

    // バリデーション
    if (!fields.title || !fields.title.trim()) {
      setError('イベント名は必須です');
      return;
    }
    if (format === 'multi' && sessions.length === 0) {
      setError('複数セッション形式の場合、セッションを1つ以上追加してください');
      return;
    }

    try {
      let result;
      let savedEventId;
      if (isEditMode) {
        result = await window.postData('updateEvent', { eventId: editId, fields });
        savedEventId = editId;
      } else {
        result = await window.postData('createEvent', fields);
        savedEventId = result && result.event && result.event.id;
      }

      // 複数セッションの場合、セッションも保存
      if (format === 'multi' && savedEventId) {
        // 新規セッション (id が ES- 始まりでないもの = フロント生成の一時ID)
        for (const sess of sessions) {
          const isNew = !sess.id || !sess.id.startsWith('ES-');
          const sessPayload = {
            eventId: savedEventId,
            order: sess.order,
            name: sess.name,
            date: sess.date,
            startTime: sess.startTime,
            endTime: sess.endTime,
            venue: sess.venue,
            address: sess.address,
            online: !!sess.online,
            zoomURL: sess.zoomURL,
            capacity: Number(sess.capacity) || 0,
            fee: Number(sess.fee) || 0,
            notes: sess.notes,
          };
          if (isNew) {
            await window.postData('createEventSession', sessPayload);
          } else {
            await window.postData('updateEventSession', { sessionId: sess.id, fields: sessPayload });
          }
        }
      }

      window.location.href = window.location.pathname + '#events';
      window.location.reload();
    } catch (err) {
      setError('保存に失敗しました: ' + err.message);
      setSaving(false);
    }
  }

  return (
    <div className="page" data-page="event-create">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs">
            <span>イベント</span>
            <span className="sep">/</span>
            <span style={{color:'var(--ink2)'}}>{isEditMode ? `編集 (${editId})` : '新規作成'}</span>
          </div>
          <h1>イベント <i>{isEditMode ? '編集' : '作成'}</i></h1>
          <div className="ph-sub">
            {isEditMode
              ? '既存イベントの内容を変更します。保存すると即座に反映されます。'
              : '基本情報を入力して保存。後から編集も可能です。'}
          </div>
        </div>
        <div className="ph-right">
          <a href="#events" className="btn btn-ghost">キャンセル</a>
          {(window.canDo('events.create') || (isEditMode && window.canDo('events.update'))) && (
            <button className="btn btn-ghost" onClick={()=>handleSave('下書き')} disabled={saving || loading}>
              {saving ? '保存中…' : '下書き保存'}
            </button>
          )}
          {(window.canDo('events.create') || (isEditMode && window.canDo('events.update'))) && (
            <button className="btn btn-indigo" onClick={()=>handleSave('公開中')} disabled={saving || loading}>
              {saving ? '保存中…' : (isEditMode ? '更新して公開' : '公開する')}
            </button>
          )}
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>エラー:</b> {error}
        </div>
      )}

      {loading && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--indigo-50)',borderRadius:8,fontSize:12,color:'var(--ink3)'}}>
          読み込み中…
        </div>
      )}

      <div className="grid-ab">
        <div className="card">
          <div className="card-head" style={{background:"var(--bg2)"}}>
            <div style={{display:'flex',gap:16,width:'100%'}}>
              {["基本情報","日程・会場","申込設定","決済","公開"].map((s, i) => {
                const n = i + 1, active = n === step, done = n < step;
                return (
                  <div key={s} style={{flex:1,display:'flex',alignItems:'center',gap:8,cursor:'pointer'}} onClick={()=>setStep(n)}>
                    <div style={{width:26,height:26,borderRadius:'50%',background:done?'var(--green)':active?'var(--indigo)':'var(--bg3)',color:done||active?'white':'var(--ink4)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:11,flex:'none'}}>
                      {done ? "✓" : n}
                    </div>
                    <div>
                      <div style={{fontSize:11,color:'var(--ink4)',fontWeight:600}}>STEP {n}</div>
                      <div style={{fontSize:12.5,fontWeight:active?700:500,color:active?'var(--ink)':'var(--ink3)'}}>{s}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="card-body" style={{padding:24}}>
            {step === 1 && (
              <div className="stack" style={{gap:16}}>
                <div className="field">
                  <label className="field-label">イベント名 <span className="field-req">*</span></label>
                  <IMEInput className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: IFT 春の鎌倉散策"/>
                  <div className="field-hint">参加者に表示されるタイトル。40字以内が推奨です。</div>
                </div>
                <div className="field">
                  <label className="field-label">カテゴリ <span className="field-req">*</span></label>
                  <div className="select-wrap">
                    <select className="input select" value={category} onChange={e=>setCategory(e.target.value)}>
                      <option value="IFT">IFT (International Friendship Tour)</option>
                      <option value="community">community (コミュニティイベント)</option>
                      <option value="hub">hub (情報・勉強会)</option>
                      <option value="order made">order made (オーダーメイド)</option>
                    </select>
                  </div>
                </div>
                <div className="field">
                  <label className="field-label">概要・説明文</label>
                  <IMETextarea className="input" style={{height:120,padding:10,resize:'vertical'}} value={summary} onChange={e=>setSummary(e.target.value)} placeholder="イベントの詳細説明、見どころ、対象者など。参加者向けの公開ページに表示されます。"/>
                  <div className="field-hint">マークダウン記法対応 (将来)、改行は反映されます</div>
                </div>
              </div>
            )}

            {step === 2 && (
              <div className="stack" style={{gap:16}}>

/**
 * QR受付。EVENTS と PARTICIPANTS が空なら EmptyState 表示。
 */
function PageQR(){
  const [events, setEvents] = useState([]);
  const [registrations, setRegistrations] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [selectedEventId, setSelectedEventId] = useState("");
  const [scanning, setScanning] = useState(false);
  const [lastResult, setLastResult] = useState(null);   // {type: 'success'|'error'|'duplicate', message, regId, name}
  const [manualQuery, setManualQuery] = useState("");
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const scanIntervalRef = useRef(null);

  // データ読み込み
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [evs, regs, parts] = await Promise.all([
          window.fetchData('listEvents'),
          window.fetchData('listRegistrations'),
          window.fetchData('listParticipants'),
        ]);
        if (cancelled) return;
        setEvents(Array.isArray(evs) ? evs : []);
        setRegistrations(Array.isArray(regs) ? regs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // カメラの開始/停止
  async function startScan() {
    if (!selectedEventId) {
      window.toast.warn('先にイベントを選択してください');
      return;
    }
    if (typeof window.jsQR === 'undefined') {
      window.toast.error('QRライブラリの読み込みに失敗しました');
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}});
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.setAttribute('playsinline', 'true');
        videoRef.current.play();
      }
      setScanning(true);
      // QR検出ループ
      scanIntervalRef.current = setInterval(() => detectQR(), 250);
    } catch (err) {
      window.toast.error('カメラへのアクセスが拒否されました: ' + (err.message || err));
    }
  }

  function stopScan() {
    if (scanIntervalRef.current) {
      clearInterval(scanIntervalRef.current);
      scanIntervalRef.current = null;
    }
    if (streamRef.current) {
      streamRef.current.getTracks().forEach(t => t.stop());
      streamRef.current = null;
    }
    setScanning(false);
  }

  // QR検出処理
  function detectQR() {
    const video = videoRef.current;
    const canvas = canvasRef.current;
    if (!video || !canvas || video.readyState !== 4) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    try {
      const code = window.jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data) {
        handleScannedCode(code.data);
      }
    } catch (e) {
      // 一回の失敗はスキップ
    }
  }

  // QR コードがスキャンされたら処理
  async function handleScannedCode(data) {
    // 同じ QR を 2 秒以内に再処理しない (どの結果でも)
    if (lastResult && lastResult.scanned === data && lastResult.scannedAt && Date.now() - lastResult.scannedAt < 2000) return;

    // QR データ形式: 「R-00001」(RegID) または「U-0001」(UserID) を想定
    // どちらも対応する
    const reg = registrations.find(r => r.id === data || r.userId === data);
    const now = Date.now();
    if (!reg) {
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'申込が見つかりません', detail:`コード: ${data}`});
      window.toast.error('申込が見つかりません');
      return;
    }
    if (reg.eventId !== selectedEventId) {
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'別イベントの申込です', detail:`${reg.eventTitle} の申込です`});
      window.toast.warn('別イベントの申込です');
      return;
    }
    if (reg.status === 'チェックイン済') {
      setLastResult({type:'duplicate', scanned:data, scannedAt:now, message:'すでにチェックイン済', regId:reg.id, name:reg.userName});
      window.toast.warn(`${reg.userName} さんは既にチェックイン済`);
      return;
    }
    if (reg.status === 'キャンセル') {
      setLastResult({type:'error', scanned:data, scannedAt:now, message:'キャンセル済の申込です', regId:reg.id, name:reg.userName});
      window.toast.error('キャンセル済みの申込');
      return;
    }
    // チェックイン処理
    try {
      await window.postData('updateRegistration', {regId: reg.id, fields: {status: 'チェックイン済'}});
      setRegistrations(prev => prev.map(r => r.id === reg.id ? {...r, status: 'チェックイン済'} : r));
      setLastResult({type:'success', scanned:data, scannedAt:now, message:'チェックイン完了', regId:reg.id, name:reg.userName});
      window.toast.success(`${reg.userName} さんをチェックインしました`);
    } catch (err) {
      window.toast.error('チェックインに失敗: ' + err.message);
    }
  }

  // 手動検索
  async function handleManualSearch() {
    if (!manualQuery.trim()) return;
    if (!selectedEventId) {
      window.toast.warn('先にイベントを選択してください');
      return;
    }
    const q = manualQuery.trim().toLowerCase();
    const reg = registrations.find(r =>
      r.eventId === selectedEventId &&
      ((r.userName || '').toLowerCase().includes(q) ||
       (r.userEmail || '').toLowerCase().includes(q) ||
       (r.id || '').toLowerCase().includes(q) ||
       (r.userId || '').toLowerCase().includes(q))
    );
    if (!reg) {
      window.toast.error('該当する申込が見つかりません');
      return;
    }
    await handleScannedCode(reg.id);
    setManualQuery("");
  }

  // 終了時にカメラを止める
  useEffect(() => {
    return () => stopScan();
  }, []);

  // 選択イベントの統計
  const eventRegs = registrations.filter(r => r.eventId === selectedEventId && r.status !== 'キャンセル');
  const checkedInCount = eventRegs.filter(r => r.status === 'チェックイン済').length;
  const totalRegCount = eventRegs.length;
  const selectedEvent = events.find(e => e.id === selectedEventId);
  const visibleEvents = events.filter(e => e.status !== "アーカイブ");

  return (
    <div className="page" data-page="qr">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>QR照会 / 受付</span></div>
          <h1>QR照会 / <i>受付</i></h1>
          <div className="ph-sub">当日受付。QRコードをカメラで読み取り、申込者を即座にチェックイン。</div>
        </div>
        <div className="ph-right">
          {scanning ? (
            <button className="btn btn-coral" onClick={stopScan}><Icon n="x" s={14}/> 受付を終了</button>
          ) : (
            <button className="btn btn-indigo" onClick={startScan} disabled={!selectedEventId}>
              <Icon n="camera" s={14}/> カメラ開始
            </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="card mb16">
        <div className="card-body" style={{display:'flex',gap:14,alignItems:'flex-end'}}>
          <div className="field" style={{flex:1,marginBottom:0}}>
            <label className="field-label">対象イベント</label>
            <div className="select-wrap">
              <select className="input select" value={selectedEventId} onChange={e=>{stopScan(); setSelectedEventId(e.target.value);}}>
                <option value="">受付するイベントを選択</option>
                {visibleEvents.map(e => (
                  <option key={e.id} value={e.id}>[{e.id}] {e.title} ({e.date || '日付未定'})</option>
                ))}
              </select>
            </div>
          </div>
          {selectedEvent && (
            <div style={{textAlign:'right',minWidth:140}}>
              <div style={{fontSize:11,color:'var(--ink4)'}}>受付状況</div>
              <div style={{fontFamily:'var(--serif)',fontSize:24,letterSpacing:'-.02em'}}>
                <b style={{color:'var(--green)'}}>{checkedInCount}</b> / {totalRegCount}
              </div>
              <div style={{fontSize:11,color:'var(--ink4)'}}>{totalRegCount > 0 ? Math.round(checkedInCount/totalRegCount*100) : 0}% チェックイン</div>
            </div>
          )}
        </div>
      </div>

      <div className="grid-ab">
        <div className="card">
          <div className="card-head">
            <div className="card-title"><Icon n="camera" s={16}/> カメラスキャン</div>
            {scanning && <span className="badge badge-green"><span className="badge-dot"></span>読取中</span>}
          </div>
          <div className="card-body">
            {!selectedEventId ? (
              <div className="empty" style={{padding:'40px 20px'}}>
                <Icon n="cal" s={28}/>
                <div style={{fontSize:13}}>イベントを選択してください</div>
                <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>受付するイベントを上のドロップダウンから選んでから、カメラを起動できます</div>
              </div>
            ) : (
              <div>
                <div style={{position:'relative',background:'var(--ink)',borderRadius:10,overflow:'hidden',aspectRatio:'4/3',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'cover',display:scanning?'block':'none'}}></video>
                  <canvas ref={canvasRef} style={{display:'none'}}></canvas>
                  {!scanning && (
                    <div style={{textAlign:'center',color:'white',padding:20}}>
                      <Icon n="qr" s={48}/>
                      <div style={{marginTop:10,fontSize:13}}>カメラ未起動</div>
                      <div style={{fontSize:11,opacity:.7,marginTop:4}}>右上の「カメラ開始」ボタンを押してください</div>
                    </div>
                  )}
                  {scanning && (
                    <div style={{position:'absolute',inset:'15%',border:'3px solid var(--coral)',borderRadius:10,pointerEvents:'none'}}></div>
                  )}
                </div>
                <div className="field-hint" style={{marginTop:8}}>
                  QRコードをカメラのフレーム内に映してください。読み取り後、自動的にチェックインされます。
                </div>
              </div>
            )}
          </div>
        </div>

        <div className="stack">
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="search" s={16}/> 手動検索 (バックアップ)</div></div>
            <div className="card-body">
              <div className="field" style={{marginBottom:0}}>
                <label className="field-label">名前・メール・ID</label>
                <div className="row" style={{gap:6}}>
                  <input className="input" style={{flex:1}} value={manualQuery} onChange={e=>setManualQuery(e.target.value)}
                    onKeyDown={e=>{if(e.key==='Enter') handleManualSearch();}}
                    placeholder="例: 山田、connecta@..." disabled={!selectedEventId}/>
                  <button className="btn btn-indigo btn-sm" onClick={handleManualSearch} disabled={!selectedEventId || !manualQuery.trim()}>
                    <Icon n="check2" s={12}/> 受付
                  </button>
                </div>
                <div className="field-hint">QR読取が失敗した場合のバックアップ手段です</div>
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="bell" s={16}/> 直近の結果</div></div>
            <div className="card-body">
              {!lastResult ? (
                <div className="empty" style={{padding:'20px 10px'}}>
                  <div style={{fontSize:12,color:'var(--ink5)'}}>まだスキャンされていません</div>
                </div>
              ) : (
                <div style={{padding:14,borderRadius:10,background:lastResult.type==='success'?'var(--green-50)':lastResult.type==='duplicate'?'var(--amber-50)':'var(--red-50)',border:'1px solid '+(lastResult.type==='success'?'var(--green-100)':lastResult.type==='duplicate'?'var(--amber-100)':'var(--red-100)')}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
                    <Icon n={lastResult.type==='success'?'check2':lastResult.type==='duplicate'?'warn':'x'} s={20}/>
                    <div style={{fontWeight:700,fontSize:14,color:lastResult.type==='success'?'var(--green)':lastResult.type==='duplicate'?'var(--amber)':'var(--red)'}}>
                      {lastResult.message}
                    </div>
                  </div>
                  {lastResult.name && <div style={{fontFamily:'var(--serif)',fontSize:18,letterSpacing:'-.015em',marginBottom:4}}>{lastResult.name}</div>}
                  {lastResult.regId && <div style={{fontSize:11,color:'var(--ink4)'}} className="mono">{lastResult.regId}</div>}
                  {lastResult.detail && <div style={{fontSize:11,color:'var(--ink3)',marginTop:4}}>{lastResult.detail}</div>}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {selectedEventId && (
        <div className="card mt16">
          <div className="card-head">
            <div className="card-title"><Icon n="users" s={16}/> 受付状況一覧</div>
            <span style={{fontSize:11,color:'var(--ink4)'}}>{eventRegs.length}件</span>
          </div>
          <div className="card-body" style={{padding:0,maxHeight:320,overflowY:'auto'}}>
            {eventRegs.length === 0 ? (
              <div className="empty" style={{padding:'30px 14px'}}>
                <div style={{fontSize:12}}>このイベントの申込がありません</div>
              </div>
            ) : (
              <table className="tbl">
                <thead><tr>
                  <th>ID</th><th>申込者</th><th>状態</th>
                </tr></thead>
                <tbody>
                  {eventRegs.map(r => (
                    <tr key={r.id}>
                      <td className="mono" style={{fontSize:11}}>{r.id}</td>
                      <td style={{fontWeight:600}}>{r.userName}<span style={{fontSize:11,color:'var(--ink4)',fontWeight:400,marginLeft:6}}>{r.userEmail}</span></td>
                      <td>
                        <span className={clsx("badge", r.status==="チェックイン済"?"badge-green":r.status==="確定"?"badge-indigo":"badge-amber")}>
                          <span className="badge-dot"></span>{r.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}
    </div>
  );
}
