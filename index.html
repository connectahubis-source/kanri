  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)',padding:20}}>
      <div className="card" style={{width:480,maxWidth:'100%'}}>
        <div className="card-body" style={{padding:32,textAlign:'center'}}>
          <div style={{width:64,height:64,borderRadius:14,background:'var(--red-50)',color:'var(--red)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
            <Icon n="x" s={28}/>
          </div>
          <div style={{fontFamily:'var(--serif)',fontSize:22,letterSpacing:'-.02em',marginBottom:6}}>接続エラー</div>
          <div style={{fontSize:12,color:'var(--ink3)',marginBottom:20,lineHeight:1.6,padding:'10px 14px',background:'var(--bg2)',borderRadius:8,fontFamily:'var(--mono)'}}>
            {message}
          </div>
          <div style={{fontSize:11,color:'var(--ink5)',marginBottom:14,lineHeight:1.6,textAlign:'left'}}>
            <b>確認事項:</b><br/>
            ・GAS WebApp の最新バージョン (1.6.0-trust-auth) がデプロイされているか<br/>
            ・「自分として実行」+「全員アクセス可」の設定になっているか<br/>
            ・index.html の CONFIG.GAS_API_URL が正しいか
          </div>
          <button className="btn btn-indigo" onClick={onRetry}>
            <Icon n="refresh" s={12}/> 再試行
          </button>
        </div>
      </div>
    </div>
  );
}

function App({user, onLogout}){
  // 初期ナビゲーションは URL hash から取得
  const getInitial = () => {
    const k = window.__getInitialNav__();
    return PAGES[k] ? k : "dashboard";
  };
  const [nav, setNav] = useStateApp(getInitial);

  useEffectApp(() => {
    const onHashChange = () => {
      const k = window.__getInitialNav__();
      if (PAGES[k]) setNav(k);
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  // ロールに応じてサイドバーのナビアイテム表示制御
  // メンバー (rank=1) は「イベント作成」など作成系を非表示
  // アシマネ未満は管理系も制限
  useEffectApp(() => {
    const navRestrictions = {
      'event-create': 'events.create',   // アシマネ以上
    };
    Object.entries(navRestrictions).forEach(([navKey, action]) => {
      const el = document.querySelector(`.nav-item[data-nav="${navKey}"]`);
      if (el) {
        el.style.display = window.canDo(action) ? '' : 'none';
      }
    });
  }, [user]);

  // 未読通知ポーリング (60秒ごと)
  // トップバーのベルアイコンに未読件数を表示
  useEffectApp(() => {
    let cancelled = false;
    async function fetchUnread() {
      try {
        const notifs = await window.fetchData('listNotifications');
        if (cancelled) return;
        const unreadCount = (Array.isArray(notifs) ? notifs : []).filter(n => n.unread).length;
        const dotEl = document.getElementById('topbar-notif-dot');
        const countEl = document.getElementById('topbar-notif-count');
        if (countEl) {
          if (unreadCount > 0) {
            countEl.textContent = unreadCount > 99 ? '99+' : String(unreadCount);
            countEl.style.display = '';
            if (dotEl) dotEl.style.display = 'none';
          } else {
            countEl.style.display = 'none';
            if (dotEl) dotEl.style.display = 'none';
          }
        }
      } catch (e) {
        // サイレント
      }
    }
    fetchUnread();
    const interval = setInterval(fetchUnread, 60000);   // 60秒
    return () => { cancelled = true; clearInterval(interval); };
  }, [user]);

  useEffectApp(() => {
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.nav === nav);
    });
    document.querySelectorAll('[data-goto]').forEach(el => {
      if (!el.dataset.gotoBound) {
        el.dataset.gotoBound = "1";
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const k = el.dataset.goto;
          if (PAGES[k]) window.__setNav__(k);
        });
      }
    });
    window.scrollTo(0, 0);
  }, [nav]);

  // ログイン中ユーザーをサイドバーフッターに表示
  useEffectApp(() => {
    if (!user || !user.member) return;
    // サイドバー内の <nav class="side-nav"> または最後の nav 要素を探す
    const sideEl = document.querySelector('aside.side') || document.querySelector('.sidebar');
    if (!sideEl) return;

    // 既存の signin-footer があれば削除
    const oldFooter = sideEl.querySelector('.signin-footer');
    if (oldFooter) oldFooter.remove();

    // 新規フッター作成
    const footer = document.createElement('div');
    footer.className = 'signin-footer';
    footer.style.cssText = 'margin-top:auto;padding:12px;border-top:1px solid var(--line);background:var(--bg2);display:flex;align-items:center;gap:10px;cursor:default';

    const m = user.member;
    const accent = m.accent || 'indigo';
    const initial = m.initial || (m.name ? m.name.charAt(0) : '?');

    footer.innerHTML = `
      <div style="width:34px;height:34px;border-radius:8px;background:var(--${accent}-50);color:var(--${accent});display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:700;flex:none">${initial}</div>
      <div style="flex:1;min-width:0;overflow:hidden">
        <div style="font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name}</div>
        <div style="font-size:10.5px;color:var(--ink4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${user.highestRole || 'メンバー'} · ${m.dept || '—'}</div>
      </div>
      <button class="signin-logout" title="ログアウト" style="background:transparent;border:1px solid var(--line);border-radius:6px;padding:6px 8px;cursor:pointer;color:var(--ink4);display:flex;align-items:center;justify-content:center" aria-label="ログアウト">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    `;

    // ログアウトボタンに onClick をバインド
    const logoutBtn = footer.querySelector('.signin-logout');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        const ok = await window.confirmDialog({
          title: 'ログアウトしますか?',
          body: '別のメンバーで使う場合は、再度サインインが必要です。',
          confirmLabel: 'ログアウト',
        });
        if (ok) onLogout();
      });
      logoutBtn.addEventListener('mouseenter', (e) => {
        e.currentTarget.style.color = 'var(--coral)';
        e.currentTarget.style.borderColor = 'var(--coral)';
      });
      logoutBtn.addEventListener('mouseleave', (e) => {
        e.currentTarget.style.color = 'var(--ink4)';
        e.currentTarget.style.borderColor = 'var(--line)';
      });
    }

    // サイドバーが flex-column を前提なので、最後に追加
    sideEl.style.display = 'flex';
    sideEl.style.flexDirection = 'column';
    sideEl.appendChild(footer);
  }, [user]);

  // トップバーのアバター・名前・ロールを更新
  useEffectApp(() => {
    if (!user || !user.member) return;
    const m = user.member;
    const initialEl = document.querySelector('[data-user-avatar]');
    const nameEl = document.querySelector('[data-user-name]');
    const roleEl = document.querySelector('[data-user-role]');
    if (initialEl) initialEl.textContent = m.initial || (m.name ? m.name.charAt(0) : '?');
    if (nameEl) nameEl.textContent = m.name || '—';
    if (roleEl) roleEl.textContent = (user.highestRole || 'メンバー') + ' · ' + (m.dept || '');
  }, [user]);

  const Comp = PAGES[nav] || PAGES.dashboard;
  const ToastContainerComp = window.ToastContainer;
  const ConfirmDialogHostComp = window.ConfirmDialogHost;
  return (
    <AppFragment>
      <Comp/>
      <ToastContainerComp/>
      <ConfirmDialogHostComp/>
    </AppFragment>
  );
}

ReactDOM.createRoot(document.getElementById('main')).render(<AuthGate/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => console.log('[PWA] Service Worker registered:', reg.scope))
      .catch((err) => console.warn('[PWA] Service Worker registration failed:', err));
  });
}

// インストール促進: beforeinstallprompt をキャプチャ
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  // インストール可能であることをフラグ立て (UI 側で利用可能)
  window._canInstallPWA = true;
});

// グローバル関数: ユーザーがインストールボタンを押した時に呼ぶ
window.installPWA = async function() {
  if (!_deferredInstallPrompt) {
    alert('このブラウザではインストール機能が利用できません。\nスマホ Safari の場合: 共有ボタン → 「ホーム画面に追加」\nスマホ Chrome の場合: メニュー → 「ホーム画面に追加」');
    return false;
  }
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  _deferredInstallPrompt = null;
  window._canInstallPWA = false;
  return outcome === 'accepted';
};
</script>
