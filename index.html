/**
 * 申込一覧 (Registrations)。Events と Participants をひも付ける中間テーブル。
 * Phase 4新で実 Spreadsheet の Registrations シートに置き換える。
 */
/**
 * 申込作成モーダル。EventID と UserID をドロップダウンで選択。
 */
function RegistrationModal({events, participants, onSave, onCancel}){
  const [eventId, setEventId] = useState("");
  const [sessionId, setSessionId] = useState("");
  const [sessions, setSessions] = useState([]);   // 選択中イベントのセッション一覧
  const [loadingSessions, setLoadingSessions] = useState(false);
  const [userId, setUserId] = useState("");
  const [paid, setPaid] = useState(false);
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  // 選択中イベントの参加費を amount にデフォルト反映
  useEffect(() => {
    if (eventId) {
      const e = events.find(x => x.id === eventId);
      if (e && e.fee) setAmount(String(e.fee));
    }
  }, [eventId]);

  // multi イベントが選ばれた時にセッション一覧を取得
  useEffect(() => {
    let cancelled = false;
    async function loadSessions() {
      if (!eventId) {
        setSessions([]);
        setSessionId("");
        return;
      }
      const ev = events.find(x => x.id === eventId);
      if (!ev || ev.format !== 'multi') {
        setSessions([]);
        setSessionId("");
        return;
      }
      setLoadingSessions(true);
      try {
        const list = await window.fetchData('listEventSessions', {eventId: eventId});
        if (!cancelled) {
          setSessions(Array.isArray(list) ? list : []);
          setSessionId("");
        }
      } catch (err) {
        if (!cancelled) setSessions([]);
      } finally {
        if (!cancelled) setLoadingSessions(false);
      }
    }
    loadSessions();
    return () => { cancelled = true; };
  }, [eventId]);

  // セッション選択時、その個別参加費を amount に
  useEffect(() => {
    if (sessionId) {
      const s = sessions.find(x => x.id === sessionId);
      if (s && s.fee) setAmount(String(s.fee));
    }
  }, [sessionId]);

  async function handleSubmit() {
    if (!eventId) {
      setError("イベントを選択してください");
      return;
    }
    if (!userId) {
      setError("参加者を選択してください");
      return;
    }
    // multi イベントなのにセッション未選択の場合
    const ev = events.find(x => x.id === eventId);
    if (ev && ev.format === 'multi' && !sessionId) {
      setError("複数セッションのイベントの場合、セッションを選択してください");
      return;
    }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        eventId, userId, sessionId,
        paid: paid,
        amount: Number(amount) || 0,
        note: note,
        status: '確定',
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  // 公開中のイベントとアーカイブ以外の参加者を選択肢に
  const visibleEvents = events.filter(e => e.status !== "アーカイブ");
  const visibleUsers = participants.filter(p => p.status !== "アーカイブ");
  const selectedEvent = events.find(x => x.id === eventId);
  const isMulti = selectedEvent && selectedEvent.format === 'multi';

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="ticket" s={16}/> 申込を追加</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel} title="閉じる"><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && (
            <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>
              {error}
            </div>
          )}
          {visibleEvents.length === 0 && (
            <div style={{padding:10,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:6,color:'var(--ink2)',fontSize:12}}>
              利用可能なイベントがありません。先にイベントを作成してください。
            </div>
          )}
          {visibleUsers.length === 0 && (
            <div style={{padding:10,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:6,color:'var(--ink2)',fontSize:12}}>
              利用可能な参加者がいません。先に参加者を登録してください。
            </div>
          )}
          <div className="field">
            <label className="field-label">イベント <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>
                <option value="">選択してください</option>
                {visibleEvents.map(e => (
                  <option key={e.id} value={e.id}>
                    [{e.id}] {e.title} ({e.date || '日付未設定'}){e.format === 'multi' ? ' [複数セッション]' : ''}
                  </option>
                ))}
              </select>
            </div>
          </div>

          {/* multi イベントの場合のみセッション選択 */}
          {isMulti && (
            <div className="field">
              <label className="field-label">
                セッション <span className="field-req">*</span>
                <span style={{fontSize:10,color:'var(--violet)',marginLeft:8,fontWeight:500}}>
                  <Icon n="layers" s={11}/> 複数セッションイベント
                </span>
              </label>
              {loadingSessions ? (
                <div style={{padding:10,color:'var(--ink4)',fontSize:12}}>セッション読み込み中...</div>
              ) : sessions.length === 0 ? (
                <div style={{padding:10,background:'var(--amber-50)',border:'1px solid var(--amber-100)',borderRadius:6,color:'var(--ink2)',fontSize:11}}>
                  このイベントにはまだセッションが登録されていません。先にイベントを編集してセッションを追加してください。
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:240,overflow:'auto',padding:4,border:'1px solid var(--line)',borderRadius:6}}>
                  {sessions.map(s => {
                    const cap = s.capacity || 0;
                    const reg = s.registered || 0;
                    const isFull = cap > 0 && reg >= cap;
                    const checked = sessionId === s.id;
                    return (
                      <label key={s.id} style={{
                        padding:'8px 10px',
                        background: checked ? 'var(--violet-50)' : (isFull ? 'var(--bg2)' : 'white'),
                        border: `1px solid ${checked ? 'var(--violet)' : 'var(--line)'}`,
                        borderRadius:6,
                        cursor: isFull ? 'not-allowed' : 'pointer',
                        opacity: isFull ? 0.5 : 1,
                        display:'flex',alignItems:'center',gap:8,fontSize:12,
                      }}>
                        <input type="radio" name="session" value={s.id}
                          checked={checked}
                          disabled={isFull}
                          onChange={()=>setSessionId(s.id)}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,color: checked ? 'var(--violet)' : 'var(--ink2)'}}>
                            {s.name || `セッション ${s.order}`}
                          </div>
                          <div style={{fontSize:10,color:'var(--ink4)',marginTop:2,display:'flex',gap:8,flexWrap:'wrap'}}>
                            <span><Icon n="clock" s={10}/> {s.date || '未設定'} {s.startTime || ''}</span>
                            {s.online ? (
                              <span style={{color:'var(--teal)'}}><Icon n="globe" s={10}/> オンライン</span>
                            ) : (
                              <span><Icon n="pin" s={10}/> {(s.venue || '会場未設定').slice(0, 16)}</span>
                            )}
                            <span style={{color: isFull ? 'var(--coral)' : 'var(--ink3)',fontWeight:isFull?600:400}}>
                              {isFull ? '満員' : `${reg}/${cap || '∞'}`}
                            </span>
                            {s.fee > 0 && <span>¥{s.fee.toLocaleString()}</span>}
                          </div>
                        </div>
                      </label>
                    );
                  })}
                </div>
              )}
              <div className="field-hint">参加するセッションを1つ選択してください</div>
            </div>
          )}

          <div className="field">
            <label className="field-label">参加者 <span className="field-req">*</span></label>
            <div className="select-wrap">
              <select className="input select" value={userId} onChange={e=>setUserId(e.target.value)}>
                <option value="">選択してください</option>
                {visibleUsers.map(p => (
                  <option key={p.id} value={p.id}>
                    [{p.id}] {p.name} ({p.email})
                  </option>
                ))}
              </select>
            </div>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">金額 (円)</label>
              <input className="input" type="number" min="0" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="0"/>
              <div className="field-hint">イベントの参加費がデフォルトで入ります</div>
            </div>
            <div className="field">
              <label className="field-label">決済済み</label>
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0'}}>
                <div onClick={()=>setPaid(!paid)} style={{width:34,height:20,background:paid?"var(--green)":"var(--line2)",borderRadius:99,position:'relative',cursor:'pointer'}}>
                  <div style={{position:'absolute',top:2,left:paid?16:2,width:16,height:16,background:'white',borderRadius:'50%',transition:'left .15s',boxShadow:'0 1px 2px rgba(0,0,0,.15)'}}></div>
                </div>
                <span style={{fontSize:12}}>{paid ? "決済済み" : "未決済"}</span>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">備考</label>
            <textarea className="input" style={{height:60,padding:10,resize:'vertical'}} value={note} onChange={e=>setNote(e.target.value)} placeholder="連絡事項など (任意)"/>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving || visibleEvents.length === 0 || visibleUsers.length === 0}>
            {saving ? '保存中…' : '申込を確定'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageRegistrations(){
  const [registrations, setRegistrations] = useState([]);
  const [events, setEvents] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [showModal, setShowModal] = useState(false);

  // 初期ロード: 3つのテーブルを並列取得
  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const [regs, evs, parts] = await Promise.all([
          window.fetchData('listRegistrations'),
          window.fetchData('listEvents'),
          window.fetchData('listParticipants'),
        ]);
        if (cancelled) return;
        setRegistrations(Array.isArray(regs) ? regs : []);
        setEvents(Array.isArray(evs) ? evs : []);
        setParticipants(Array.isArray(parts) ? parts : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  // 申込作成
  async function handleSave(fields) {
    await window.postData('createRegistration', fields);
    window.location.reload();
  }

  // 申込削除 (キャンセル化)
  async function handleCancel(regId) {
    const r = registrations.find(x => x.id === regId);
    if (!r) return;
    if (!await window.confirmDialog({title:`「${r.userName} さん × ${r.eventTitle}」の申込をキャンセルしますか?`, body:'申込数も -1 されます。後で同じユーザーで再申込が可能です。', danger:true, confirmLabel:'キャンセル化'})) return;

    setRegistrations(prev => prev.map(x => x.id === regId ? {...x, status: 'キャンセル'} : x));

    try {
      await window.postData('deleteRegistration', { regId });
    } catch (err) {
      setRegistrations(prev => prev.map(x => x.id === regId ? {...x, status: r.status} : x));
      window.toast.error('キャンセルに失敗しました: ' + err.message);
    }
  }

  // フィルタ済み
  const visible = registrations.filter(r => {
    if (filter !== "all" && r.status !== filter) return false;
    if (query) {
      const q = query.toLowerCase();
      return (r.userName || '').toLowerCase().includes(q)
          || (r.userEmail || '').toLowerCase().includes(q)
          || (r.id || '').toLowerCase().includes(q)
          || (r.eventTitle || '').toLowerCase().includes(q);
    }
    return true;
  });

  // 集計
  const total = registrations.length;
  const confirmed = registrations.filter(r => r.status === "確定").length;
  const unpaid = registrations.filter(r => r.status === "未決済").length;
  const cancelled = registrations.filter(r => r.status === "キャンセル").length;
  const pct = (n) => total > 0 ? Math.round(n / total * 100) : 0;

  return (
    <div className="page" data-page="registrations">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>申込一覧</span></div>
          <h1>申込 <i>一覧</i></h1>
          <div className="ph-sub">全イベント横断の申込履歴。Events と Participants をひも付ける中核機能。</div>
        </div>
        <div className="ph-right">
          {window.canDo('registrations.create') && (
          <button className="btn btn-indigo" onClick={()=>setShowModal(true)}>
            <Icon n="plus" s={14}/> 手動登録
          </button>
          )}
        </div>
      </div>

      {error && (
        <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}>
          <b>読み込みエラー:</b> {error}
        </div>
      )}

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(4,1fr)'}}>
        <MiniStat label="申込総数" value={loading ? '…' : String(total)} sub="" icon="users" color="indigo"/>
        <MiniStat label="確定" value={loading ? '…' : String(confirmed)} sub={total > 0 ? `${pct(confirmed)}%` : ''} icon="check2" color="green"/>
        <MiniStat label="未決済" value={loading ? '…' : String(unpaid)} sub={total > 0 ? '要対応' : ''} icon="card" color="amber"/>
        <MiniStat label="キャンセル" value={loading ? '…' : String(cancelled)} sub={total > 0 ? `${pct(cancelled)}%` : ''} icon="x" color="red"/>
      </div>

      <div className="row mb16">
        <div className="search-bar" style={{flex:1,maxWidth:340}}>
          <Icon n="search" s={14}/>
          <input className="input" placeholder="名前・メール・ID・イベント名..." value={query} onChange={e=>setQuery(e.target.value)}/>
        </div>
        {[["all","すべて"],["確定","確定"],["未決済","未決済"],["キャンセル","キャンセル"]].map(([k,l]) => (
          <div key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>{l}</div>
        ))}
        <div style={{flex:1}}></div>
        <span style={{fontSize:11,color:'var(--ink4)'}}>
          {loading ? '読み込み中...' : `${visible.length} 件`}
        </span>
      </div>

      {!loading && visible.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 40px'}}>
            <Icon n="ticket" s={28}/>
            <div style={{fontFamily:'var(--serif)',fontSize:20,marginTop:6,color:'var(--ink2)'}}>
              {registrations.length === 0 ? '申込がまだありません' : '該当する申込がありません'}
            </div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4,maxWidth:380,lineHeight:1.5}}>
              {registrations.length === 0 ? '右上の「手動登録」ボタンから最初の申込を登録できます。' : '別のフィルタやキーワードでお試しください'}
            </div>
          </div>
        </div>
      ) : (
        <div className="card">
          <table className="tbl">
            <thead><tr>
              <th style={{width:32}}><span className="ck"></span></th>
              <th>ID</th><th>申込者</th><th>イベント</th><th>申込日</th><th>金額</th><th>状態</th><th></th>
            </tr></thead>
            <tbody>
              {visible.map((r, i) => (
                <tr key={r.id} style={{opacity: r.status === "キャンセル" ? 0.5 : 1}}>
                  <td><span className="ck"></span></td>
                  <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{r.id}</td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div className={`avatar sm ${["indigo","coral","green","violet","teal"][i%5]}`}>{(r.userName || '?')[0]}</div>
                      <div>
                        <div style={{fontWeight:600}}>{r.userName || '—'}</div>
                        <div style={{fontSize:11,color:'var(--ink4)'}}>{r.userEmail || '—'}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <div style={{width:3,height:18,background:`var(--${r.eventAccent})`,borderRadius:2}}></div>
                      <div style={{fontSize:12}}>{r.eventTitle || '—'}</div>
                    </div>
                  </td>
                  <td className="mono" style={{fontSize:11,color:'var(--ink3)'}}>{r.appliedAt || '—'}</td>
                  <td className="num">
                    {r.amount ? yen(r.amount) : "無料"}
                    {r.paid && <span className="badge badge-green" style={{fontSize:9,marginLeft:4}}>済</span>}
                  </td>
                  <td>
                    <span className={clsx("badge",
                      r.status==="確定"?"badge-green"
                      : r.status==="未決済"?"badge-amber"
                      : r.status==="チェックイン済"?"badge-indigo"
                      : "badge-ink")}>
                      <span className="badge-dot"></span>{r.status}
                    </span>
                  </td>
                  <td>
                    <div className="row-actions">
                      
                      {r.status !== "キャンセル" && window.canDo('registrations.delete') && (
                        <button className="btn btn-soft btn-sm btn-icon" title="申込をキャンセル" onClick={()=>handleCancel(r.id)}>
                          <Icon n="trash" s={12}/>
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {showModal && (
        <RegistrationModal
          events={events}
          participants={participants}
          onSave={handleSave}
          onCancel={()=>setShowModal(false)}
        />
      )}
    </div>
  );
}

/**
 * 満足度調査。NPS、回答率、自由回答などを集計表示。

// -------------------- PageSatisfaction --------------------

/**
 * 満足度調査作成・編集モーダル。
 */
function SurveyModal({mode, initialValues, events, onSave, onCancel}){
  const init = initialValues || {};
  const [title, setTitle] = useState(init.title || "");
  const [eventId, setEventId] = useState(init.eventId || "");
  const [q1, setQ1] = useState(init.question1 || "このイベントを他の人に勧めたいと思いますか? (0-10)");
  const [q2, setQ2] = useState(init.question2 || "今回の体験にどれくらい満足しましたか? (1-10)");
  const [q3, setQ3] = useState(init.question3 || "改善点や感想を自由にお聞かせください");
  const [status, setStatus] = useState(init.status || "下書き");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (!title.trim()) { setError("タイトルは必須です"); return; }
    if (!eventId) { setError("対象イベントは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        title: title.trim(),
        eventId,
        question1: q1.trim(),
        question2: q2.trim(),
        question3: q3.trim(),
        status,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:600,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="star" s={16}/> {mode === "create" ? "アンケートを作成" : "アンケートを編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">タイトル <span className="field-req">*</span></label>
            <input className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 2026春IFT 参加後アンケート"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">対象イベント <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={eventId} onChange={e=>setEventId(e.target.value)}>
                  <option value="">選択してください</option>
                  {events.filter(e => e.status !== "アーカイブ").map(e => (
                    <option key={e.id} value={e.id}>[{e.id}] {e.title}</option>
                  ))}
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">ステータス</label>
              <div className="select-wrap">
                <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                  <option>下書き</option>
                  <option>公開中</option>
                  <option>アーカイブ</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">質問1: NPS (0-10)</label>
            <input className="input" value={q1} onChange={e=>setQ1(e.target.value)}/>
          </div>
          <div className="field">
            <label className="field-label">質問2: 満足度 (1-10)</label>
            <input className="input" value={q2} onChange={e=>setQ2(e.target.value)}/>
          </div>
          <div className="field">
            <label className="field-label">質問3: 自由回答</label>
            <input className="input" value={q3} onChange={e=>setQ3(e.target.value)}/>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : (mode === "create" ? '作成' : '更新')}
          </button>
        </div>
      </div>
    </div>
  );
}

/**
 * 回答登録モーダル。運営側から手動で回答を入力する用途。
 */
function ResponseModal({survey, onSave, onCancel}){
  const [nps, setNps] = useState("");
  const [csat, setCsat] = useState("");
  const [free, setFree] = useState("");
  const [userId, setUserId] = useState("");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit() {
    if (nps === "" && csat === "" && !free.trim()) {
      setError("少なくとも1つの項目を入力してください");
      return;
    }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        surveyId: survey.id,
        userId: userId.trim(),
        nps: nps === "" ? null : Number(nps),
        csat: csat === "" ? null : Number(csat),
        free: free.trim(),
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:520,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="plus" s={16}/> 回答を登録</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div style={{padding:10,background:'var(--bg2)',borderRadius:8,fontSize:12}}>
            <b>{survey.title}</b><br/>
            <span style={{color:'var(--ink4)'}}>{survey.eventTitle}</span>
          </div>
          <div className="field">
            <label className="field-label">回答者ID (任意)</label>
            <input className="input" value={userId} onChange={e=>setUserId(e.target.value)} placeholder="例: U-0001 (匿名なら空)"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">NPS (0-10)</label>
              <input className="input" type="number" min="0" max="10" value={nps} onChange={e=>setNps(e.target.value)} placeholder="0-10"/>
              <div className="field-hint">推奨度。9-10=推奨者、7-8=中立、0-6=批判者</div>
            </div>
            <div className="field">
              <label className="field-label">満足度 (1-10)</label>
              <input className="input" type="number" min="1" max="10" value={csat} onChange={e=>setCsat(e.target.value)} placeholder="1-10"/>
              <div className="field-hint">10段階評価。10=非常に満足</div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">自由回答</label>
            <textarea className="input" style={{height:100,padding:10,resize:'vertical'}} value={free} onChange={e=>setFree(e.target.value)} placeholder="参加者からのフィードバックを入力..."/>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'flex-end',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <button className="btn btn-indigo" onClick={handleSubmit} disabled={saving}>
            {saving ? '保存中…' : '登録'}
          </button>
        </div>
      </div>
    </div>
  );
}

function PageSatisfaction(){
  const [surveys, setSurveys] = useState([]);
  const [responses, setResponses] = useState([]);   // 全アンケートの回答
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("active");   // active / archived / all
  const [editing, setEditing] = useState(null);     // {mode, values}
  const [responseModal, setResponseModal] = useState(null);   // survey or null
  const [expandedSurvey, setExpandedSurvey] = useState(null);

  async function fetchAll() {
    setLoading(true);
    setError(null);
    try {
      const [svs, evs] = await Promise.all([
        window.fetchData('listSurveys'),
        window.fetchData('listEvents'),
      ]);
      setSurveys(Array.isArray(svs) ? svs : []);
      setEvents(Array.isArray(evs) ? evs : []);
      // 全アンケートの回答を並列取得
      const respArrays = await Promise.all(
        (Array.isArray(svs) ? svs : []).map(s =>
          window.fetchData('listSurveyResponses', {surveyId: s.id}).catch(() => [])
        )
      );
      const allResp = [].concat(...respArrays.map(r => Array.isArray(r) ? r : []));
      setResponses(allResp);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchAll(); }, []);

  const visibleSurveys = surveys.filter(s => {
    if (filter === "active") return s.status !== "アーカイブ";
    if (filter === "archived") return s.status === "アーカイブ";
    return true;
  });

  function getResponsesFor(surveyId) {
    return responses.filter(r => r.surveyId === surveyId);
  }

  // NPS 計算 (推奨者 9-10、批判者 0-6)
  function calcNps(resps) {
    const valid = resps.filter(r => r.nps !== null && r.nps !== undefined);
    if (valid.length === 0) return null;
    const promoters = valid.filter(r => r.nps >= 9).length;
    const detractors = valid.filter(r => r.nps <= 6).length;
    return Math.round((promoters - detractors) / valid.length * 100);
  }

  // 満足度平均 (1-10)
  function calcCsat(resps) {
    const valid = resps.filter(r => r.csat !== null && r.csat !== undefined);
    if (valid.length === 0) return null;
    return (valid.reduce((s, r) => s + r.csat, 0) / valid.length).toFixed(1);
  }

  // 統計サマリー
  const allResp = responses;
  const totalResponses = allResp.length;
  const overallNps = calcNps(allResp);
  const overallCsat = calcCsat(allResp);

  // ========== CRUD アクション ==========

  async function handleCreate(payload) {
    await window.postData('createSurvey', payload);
    setEditing(null);
    window.toast.success('アンケートを作成しました');
    await fetchAll();
  }

  async function handleUpdate(surveyId, payload) {
    await window.postData('updateSurvey', {surveyId, fields: payload});
    setEditing(null);
    window.toast.success('アンケートを更新しました');
    await fetchAll();
  }

  async function handleDelete(surveyId, title) {
    if (!await window.confirmDialog({
      title: `「${title}」をアーカイブしますか?`,
      body: '行は残り、ステータスが「アーカイブ」に変わります。後で復元できます。',
      danger: true,
      confirmLabel: 'アーカイブ',
    })) return;
    try {
      await window.postData('deleteSurvey', {surveyId});
      window.toast.success('アーカイブしました');
      await fetchAll();
    } catch (err) {
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  async function handleResponseCreate(payload) {
    await window.postData('createSurveyResponse', payload);
    setResponseModal(null);
    window.toast.success('回答を登録しました');
    await fetchAll();
  }

  async function handleResponseDelete(responseId) {
    if (!await window.confirmDialog({
      title: '回答を削除しますか?',
      body: '物理削除されます。元に戻せません。',
      danger: true,
      confirmLabel: '削除',
    })) return;
    try {
      await window.postData('deleteSurveyResponse', {responseId});
      window.toast.success('削除しました');
      await fetchAll();
    } catch (err) {
      window.toast.error('削除に失敗しました: ' + err.message);
    }
  }

  return (
    <div className="page" data-page="satisfaction">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>イベント</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>満足度調査</span></div>
          <h1>満足度 <i>調査</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `${surveys.filter(s=>s.status!=='アーカイブ').length}件のアンケート、${totalResponses}件の回答。`}</div>
        </div>
        <div className="ph-right">
          {window.canDo('surveys.create') && (
          <button className="btn btn-indigo" onClick={()=>setEditing({mode:'create', values:{}})}>
            <Icon n="plus" s={14}/> アンケートを作成
          </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      {/* 全体統計 */}
      <div className="kpi-grid">
        <MiniStat label="アンケート数" value={loading ? '…' : String(surveys.filter(s=>s.status!=='アーカイブ').length)} sub="公開中 + 下書き" icon="star" color="indigo"/>
        <MiniStat label="総回答数" value={loading ? '…' : String(totalResponses)} sub="全アンケート合計" icon="users" color="teal"/>
        <MiniStat label="全体 NPS" value={loading ? '…' : (overallNps !== null ? String(overallNps) : '—')} sub="推奨者-批判者(%)" icon="trend" color="green"/>
        <MiniStat label="平均満足度" value={loading ? '…' : (overallCsat !== null ? `${overallCsat}/10` : '—')} sub="10段階評価" icon="check2" color="violet"/>
      </div>

      {/* タブ */}
      <div className="tabs">
        {[["active","公開中・下書き", surveys.filter(s=>s.status!=='アーカイブ').length], ["archived","アーカイブ", surveys.filter(s=>s.status==='アーカイブ').length], ["all","全部", surveys.length]].map(([k,l,c]) => (
          <div key={k} className={clsx("tab", filter===k && "active")} onClick={()=>setFilter(k)}>
            {l}<span className="count">{c}</span>
          </div>
        ))}
      </div>

      {/* アンケート一覧 */}
      {!loading && visibleSurveys.length === 0 ? (
        <div className="card">
          <div className="empty" style={{padding:'60px 20px'}}>
            <Icon n="star" s={28}/>
            <div style={{fontSize:14,marginTop:8}}>アンケートがありません</div>
            <div style={{fontSize:12,color:'var(--ink5)',marginTop:4}}>「アンケートを作成」から登録できます</div>
          </div>
        </div>
      ) : (
        <div className="stack" style={{gap:12}}>
          {visibleSurveys.map(s => {
            const resps = getResponsesFor(s.id);
            const sNps = calcNps(resps);
            const sCsat = calcCsat(resps);
            const isExpanded = expandedSurvey === s.id;
            return (
              <div key={s.id} className="card">
                <div className="card-head" style={{cursor:'pointer'}} onClick={()=>setExpandedSurvey(isExpanded ? null : s.id)}>
                  <div style={{flex:1,display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:4,height:32,background:`var(--${s.eventAccent})`,borderRadius:2}}></div>
                    <div>
                      <div style={{fontWeight:700,fontSize:14}}>{s.title}</div>
                      <div style={{fontSize:11,color:'var(--ink4)'}}>
                        <span className="mono">{s.id}</span> · {s.eventTitle || '—'}
                        {s.publishedAt && ` · 公開: ${s.publishedAt}`}
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:14}}>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,color:'var(--ink4)'}}>回答</div>
                      <div style={{fontFamily:'var(--serif)',fontSize:18}}>{resps.length}</div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,color:'var(--ink4)'}}>NPS</div>
                      <div style={{fontFamily:'var(--serif)',fontSize:18,color: sNps !== null ? (sNps >= 0 ? 'var(--green)' : 'var(--coral)') : 'var(--ink4)'}}>
                        {sNps !== null ? sNps : '—'}
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div style={{fontSize:11,color:'var(--ink4)'}}>満足度</div>
                      <div style={{fontFamily:'var(--serif)',fontSize:18,color:'var(--violet)'}}>
                        {sCsat !== null ? sCsat : '—'}
                      </div>
                    </div>
                    <span className={clsx("badge", s.status==="公開中"?"badge-green":s.status==="下書き"?"badge-amber":"badge-ink")}>
                      <span className="badge-dot"></span>{s.status}
                    </span>
                    <Icon n={isExpanded ? "chevDown" : "chevRight"} s={14}/>
                  </div>
                </div>

                {isExpanded && (
                  <div style={{borderTop:'1px solid var(--line)'}}>
                    <div style={{padding:14,background:'var(--bg2)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div style={{fontSize:12,color:'var(--ink3)'}}>
                        <b>質問1 (NPS):</b> {s.question1}<br/>
                        <b>質問2 (満足度):</b> {s.question2}<br/>
                        <b>質問3 (自由):</b> {s.question3}
                      </div>
                      <div style={{display:'flex',gap:6}}>
                        {window.canDo('surveys.update') && (
                          <button className="btn btn-soft btn-sm" onClick={(e)=>{e.stopPropagation(); setResponseModal(s);}}>
                            <Icon n="plus" s={12}/> 回答登録
                          </button>
                        )}
                        {window.canDo('surveys.update') && (
                          <button className="btn btn-soft btn-sm" onClick={(e)=>{e.stopPropagation(); setEditing({mode:'edit', values:s});}}>
                            <Icon n="edit" s={12}/> 編集
                          </button>
                        )}
                        {s.status !== 'アーカイブ' && window.canDo('surveys.delete') && (
                          <button className="btn btn-soft btn-sm" onClick={(e)=>{e.stopPropagation(); handleDelete(s.id, s.title);}} style={{color:'var(--coral)'}}>
                            <Icon n="trash" s={12}/>
                          </button>
                        )}
                      </div>
                    </div>
                    {resps.length === 0 ? (
                      <div className="empty" style={{padding:'30px 20px'}}>
                        <div style={{fontSize:12}}>まだ回答がありません</div>
                        <div style={{fontSize:11,color:'var(--ink5)',marginTop:4}}>「回答登録」から登録できます</div>
                      </div>
                    ) : (
                      <table className="tbl">
                        <thead><tr>
                          <th>ID</th>
                          <th>回答者</th>
                          <th className="right">NPS</th>
                          <th className="right">満足度</th>
                          <th>自由回答</th>
                          <th>日時</th>
                          <th></th>
                        </tr></thead>
                        <tbody>
                          {resps.map(r => (
                            <tr key={r.id}>
                              <td className="mono" style={{fontSize:11}}>{r.id}</td>
                              <td>{r.userId || <span style={{color:'var(--ink5)'}}>匿名</span>}</td>
                              <td className="right num">
                                {r.nps !== null ? (
                                  <span style={{color: r.nps >= 9 ? 'var(--green)' : r.nps >= 7 ? 'var(--amber)' : 'var(--coral)', fontWeight:700}}>
                                    {r.nps}
                                  </span>
                                ) : '—'}
                              </td>
                              <td className="right num">
                                {r.csat !== null ? <b style={{color:'var(--violet)'}}>{r.csat}</b> : '—'}
                              </td>
                              <td style={{fontSize:12,maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.free}>
                                {r.free || <span style={{color:'var(--ink5)'}}>—</span>}
                              </td>
                              <td className="mono" style={{fontSize:11,color:'var(--ink4)'}}>{r.answeredAt}</td>
                              <td>
                                {window.canDo('surveys.delete') && (
                                  <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>handleResponseDelete(r.id)} title="削除" style={{color:'var(--coral)'}}>
                                    <Icon n="trash" s={12}/>
                                  </button>
                                )}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {editing && (
        <SurveyModal
          mode={editing.mode}
          initialValues={editing.values}
          events={events}
          onSave={editing.mode === 'create' ? handleCreate : (payload => handleUpdate(editing.values.id, payload))}
          onCancel={()=>setEditing(null)}
        />
      )}

      {responseModal && (
        <ResponseModal
          survey={responseModal}
          onSave={handleResponseCreate}
          onCancel={()=>setResponseModal(null)}
        />
      )}
    </div>
  );
}

window.PageEvents = PageEvents;
window.PageRegistrations = PageRegistrations;
window.PageSatisfaction = PageSatisfaction;
</script>

<script type="text/babel" data-presets="react">

// -------------------- PageMail --------------------

function PageMail(){
  const [templates, setTemplates] = useState([]);
  const [participants, setParticipants] = useState([]);
  const [events, setEvents] = useState([]);
  const [registrations, setRegistrations] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  // フォーム state
  const [selectedTemplateId, setSelectedTemplateId] = useState("");
  const [subject, setSubject] = useState("");
  const [body, setBody] = useState("");
  const [filterMode, setFilterMode] = useState("event");   // event / tag / all / none
  const [filterEventId, setFilterEventId] = useState("");
  const [filterTag, setFilterTag] = useState("");
  const [selectedRecipients, setSelectedRecipients] = useState([]);   // user IDs

  async function fetchAll() {
    setLoading(true);
    setError(null);
    try {
      const [tpls, parts, evs, regs] = await Promise.all([
        window.fetchData('listTemplates'),
        window.fetchData('listParticipants'),
        window.fetchData('listEvents'),
        window.fetchData('listRegistrations'),
      ]);
      setTemplates(Array.isArray(tpls) ? tpls : []);
      setParticipants(Array.isArray(parts) ? parts : []);
      setEvents(Array.isArray(evs) ? evs : []);
      setRegistrations(Array.isArray(regs) ? regs : []);
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { fetchAll(); }, []);

  // 配信先候補 (フィルタ適用)
  const mailTemplates = templates.filter(t => t.category === "メール" && t.status !== "アーカイブ");
  const visibleParticipants = participants.filter(p => p.status !== "アーカイブ" && p.email);

  let filteredRecipients = visibleParticipants;
  if (filterMode === "event" && filterEventId) {
    const eventRegs = registrations.filter(r => r.eventId === filterEventId && r.status !== "キャンセル");
    const userIds = new Set(eventRegs.map(r => r.userId));
    filteredRecipients = visibleParticipants.filter(p => userIds.has(p.id));
  } else if (filterMode === "tag" && filterTag.trim()) {
    const q = filterTag.trim().toLowerCase();
    filteredRecipients = visibleParticipants.filter(p =>
      (p.tags || "").toLowerCase().includes(q) ||
      (p.affiliation || "").toLowerCase().includes(q)
    );
  } else if (filterMode === "none") {
    filteredRecipients = [];
  }

  // 全選択 / 全解除
  function selectAllFiltered() {
    setSelectedRecipients(filteredRecipients.map(p => p.id));
  }
  function deselectAll() {
    setSelectedRecipients([]);
  }
  function toggleRecipient(userId) {
    setSelectedRecipients(prev =>
      prev.includes(userId) ? prev.filter(id => id !== userId) : [...prev, userId]
    );
  }

  // 選択された人のメール一覧
  const selectedEmails = selectedRecipients
    .map(id => visibleParticipants.find(p => p.id === id))
    .filter(Boolean)
    .map(p => p.email);

  // mailto: リンク生成 (BCCで一斉送信)
  function buildMailtoLink() {
    if (selectedEmails.length === 0) return null;
    const params = new URLSearchParams();
    if (subject) params.set('subject', subject);
    if (body) params.set('body', body);
    // 1人なら to:、複数なら BCC で送信 (プライバシー保護)
    if (selectedEmails.length === 1) {
      return `mailto:${encodeURIComponent(selectedEmails[0])}?${params.toString()}`;
    } else {
      params.set('bcc', selectedEmails.join(','));
      return `mailto:?${params.toString()}`;
    }
  }

  function buildGmailComposeLink() {
    if (selectedEmails.length === 0) return null;
    // Gmail 直接起動: https://mail.google.com/mail/?view=cm
    const params = new URLSearchParams();
    params.set('view', 'cm');
    params.set('fs', '1');
    if (subject) params.set('su', subject);
    if (body) params.set('body', body);
    if (selectedEmails.length === 1) {
      params.set('to', selectedEmails[0]);
    } else {
      params.set('bcc', selectedEmails.join(','));
    }
    return `https://mail.google.com/mail/?${params.toString()}`;
  }

  function copyEmailsToClipboard() {
    if (selectedEmails.length === 0) return;
    const text = selectedEmails.join(', ');
    navigator.clipboard.writeText(text).then(() => {
      window.toast.success(`${selectedEmails.length} 件のメールアドレスをコピーしました`);
    }).catch(() => {
      window.toast.error('コピーに失敗しました');
    });
  }

  function clearForm() {
    setSelectedTemplateId("");
    setSubject("");
    setBody("");
    setSelectedRecipients([]);
  }

  return (
    <div className="page" data-page="mail">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>コミュニケーション</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>メール配信</span></div>
          <h1>メール <i>配信</i></h1>
          <div className="ph-sub">{loading ? 'データ読み込み中…' : `定型文 ${mailTemplates.length}件、参加者 ${visibleParticipants.length}人。テンプレ選択 → 配信先選択 → Gmailで送信。`}</div>
        </div>
        <div className="ph-right">
          <button className="btn btn-ghost" onClick={clearForm}><Icon n="refresh" s={14}/> リセット</button>
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div style={{padding:"10px 14px",marginBottom:14,background:'var(--indigo-50)',border:'1px solid var(--indigo-100)',borderRadius:8,color:'var(--ink2)',fontSize:12,lineHeight:1.6}}>
        <b style={{color:'var(--indigo)'}}>📧 メール配信:</b> テンプレ選択 + 配信先選択 → 「Gmailで送信」ボタンで Gmail 作成画面に遷移します。複数人は BCC で一斉送信されます。
      </div>

      <div className="grid-ab">
        <div className="stack">
          {/* 1. テンプレート選択 */}
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="file" s={16}/> 1. 定型文を選ぶ (任意)</div></div>
            <div className="card-body">
              <div className="field" style={{marginBottom:0}}>
                <label className="field-label">メールテンプレート</label>
                <div className="select-wrap">
                  <select className="input select" value={selectedTemplateId} onChange={e=>{
                    const tplId = e.target.value;
                    setSelectedTemplateId(tplId);
                    const tpl = templates.find(t => t.id === tplId);
                    if (tpl) {
                      setSubject(tpl.name);
                      setBody(tpl.body || "");
                    }
                  }}>
                    <option value="">テンプレを使わない</option>
                    {mailTemplates.map(t => (
                      <option key={t.id} value={t.id}>[{t.id}] {t.name}</option>
                    ))}
                  </select>
                </div>
                <div className="field-hint">選択すると件名・本文に自動セットされます</div>
              </div>
            </div>
          </div>

          {/* 2. 件名・本文 */}
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="edit" s={16}/> 2. 件名・本文</div></div>
            <div className="card-body stack" style={{gap:12}}>
              <div className="field">
                <label className="field-label">件名 <span className="field-req">*</span></label>
                <input className="input input-lg" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="例: 春のIFT 参加確認のお知らせ"/>
              </div>
              <div className="field">
                <label className="field-label">本文</label>
                <textarea className="input" style={{height:240,padding:12,resize:'vertical',fontSize:13,lineHeight:1.6}} value={body} onChange={e=>setBody(e.target.value)} placeholder="本文を入力..."/>
                <div className="field-hint">変数置換 ({`{{name}}`} {`{{event}}`} 等) は手動で書き換えてください。</div>
              </div>
            </div>
          </div>
        </div>

        <div className="stack">
          {/* 3. 配信先 */}
          <div className="card">
            <div className="card-head">
              <div className="card-title"><Icon n="users" s={16}/> 3. 配信先</div>
              <span className="badge badge-indigo">{selectedRecipients.length}人 選択中</span>
            </div>
            <div className="card-body">
              <div className="row" style={{gap:6,marginBottom:10,flexWrap:'wrap'}}>
                {[["event","イベント参加者"],["tag","タグ"],["all","全員"],["none","個別選択"]].map(([k,l]) => (
                  <span key={k} className={clsx("chip", filterMode===k && "on")} onClick={()=>setFilterMode(k)}>{l}</span>
                ))}
              </div>

              {filterMode === "event" && (
                <div className="field" style={{marginBottom:10}}>
                  <div className="select-wrap">
                    <select className="input select" value={filterEventId} onChange={e=>setFilterEventId(e.target.value)}>
                      <option value="">イベントを選択</option>
                      {events.filter(e => e.status !== "アーカイブ").map(e => (
                        <option key={e.id} value={e.id}>[{e.id}] {e.title}</option>
                      ))}
                    </select>
                  </div>
                </div>
              )}
              {filterMode === "tag" && (
                <div className="field" style={{marginBottom:10}}>
                  <input className="input" value={filterTag} onChange={e=>setFilterTag(e.target.value)} placeholder="タグまたは所属で絞り込み..."/>
                </div>
              )}

              <div className="row" style={{gap:6,marginBottom:8}}>
                <button className="btn btn-soft btn-sm" onClick={selectAllFiltered} disabled={filteredRecipients.length === 0}>
                  全選択 ({filteredRecipients.length}件)
                </button>
                <button className="btn btn-soft btn-sm" onClick={deselectAll} disabled={selectedRecipients.length === 0}>
                  解除
                </button>
              </div>

              <div style={{maxHeight:240,overflowY:'auto',border:'1px solid var(--line)',borderRadius:8}}>
                {filteredRecipients.length === 0 ? (
                  <div className="empty" style={{padding:'30px 14px'}}>
                    <div style={{fontSize:12}}>
                      {filterMode === 'none' ? '下のリストから個別選択してください' : '該当する参加者がいません'}
                    </div>
                  </div>
                ) : (
                  filteredRecipients.map(p => {
                    const checked = selectedRecipients.includes(p.id);
                    return (
                      <div key={p.id} onClick={()=>toggleRecipient(p.id)}
                        style={{padding:'8px 12px',borderBottom:'1px solid var(--line)',cursor:'pointer',display:'flex',alignItems:'center',gap:10,background:checked?'var(--indigo-50)':'transparent'}}>
                        <span className={clsx("ck", checked && "on")}></span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
                          <div style={{fontSize:11,color:'var(--ink4)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.email}</div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>

              {filterMode === 'none' && visibleParticipants.length > 0 && (
                <div style={{marginTop:8,padding:8,background:'var(--bg2)',borderRadius:6,fontSize:11,color:'var(--ink4)'}}>
                  全 {visibleParticipants.length} 人の参加者から選択できます
                </div>
              )}
            </div>
          </div>

          {/* 4. 送信 */}
          <div className="card">
            <div className="card-head"><div className="card-title"><Icon n="send" s={16}/> 4. 送信</div></div>
            <div className="card-body stack" style={{gap:10}}>
              <div style={{padding:10,background:'var(--bg2)',borderRadius:8,fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{color:'var(--ink4)'}}>配信先</span>
                  <b>{selectedRecipients.length}人</b>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:'var(--ink4)'}}>送信方式</span>
                  <span>{selectedRecipients.length === 1 ? 'TO (個別)' : selectedRecipients.length > 1 ? 'BCC (一斉)' : '—'}</span>
                </div>
              </div>
              <a className={clsx("btn", selectedEmails.length === 0 || !subject ? "btn-soft" : "btn-coral")}
                href={buildGmailComposeLink() || '#'}
                target="_blank" rel="noopener noreferrer"
                onClick={(e) => {
                  if (selectedEmails.length === 0) { e.preventDefault(); window.toast.warn('配信先を選択してください'); return; }
                  if (!subject) { e.preventDefault(); window.toast.warn('件名を入力してください'); return; }
                }}
                style={{justifyContent:'center',padding:'10px 14px'}}>
                <Icon n="mail" s={14}/> Gmail で開く ({selectedEmails.length}人)
              </a>
              <a className={clsx("btn", selectedEmails.length === 0 || !subject ? "btn-soft" : "btn-ghost")}
                href={buildMailtoLink() || '#'}
                onClick={(e) => {
                  if (selectedEmails.length === 0) { e.preventDefault(); window.toast.warn('配信先を選択してください'); return; }
                  if (!subject) { e.preventDefault(); window.toast.warn('件名を入力してください'); return; }
                }}
                style={{justifyContent:'center',padding:'10px 14px'}}>
                <Icon n="send" s={14}/> 既定メーラーで開く
              </a>
              <button className="btn btn-ghost" onClick={copyEmailsToClipboard} disabled={selectedEmails.length === 0} style={{justifyContent:'center'}}>
                <Icon n="copy" s={14}/> メールアドレスをコピー
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/**
 * News 作成・編集モーダル。
 */
function NewsModal({mode, initialValues, onSave, onCancel}){
  const init = initialValues || {};
  const [title, setTitle] = useState(init.title || "");
  const [category, setCategory] = useState(init.category || "お知らせ");
  const [body, setBody] = useState(init.body || "");
  const [status, setStatus] = useState(init.status || "下書き");
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState(null);

  async function handleSubmit(publishStatus) {
    if (!title.trim()) { setError("タイトルは必須です"); return; }
    if (!category) { setError("カテゴリは必須です"); return; }
    setSaving(true);
    setError(null);
    try {
      await onSave({
        title: title.trim(),
        category,
        body,
        status: publishStatus || status,
      });
    } catch (err) {
      setError(err.message || String(err));
      setSaving(false);
    }
  }

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}} onClick={onCancel}>
      <div className="card" style={{width:680,maxWidth:'94%',maxHeight:'90vh',overflow:'auto'}} onClick={(e)=>e.stopPropagation()}>
        <div className="card-head">
          <div className="card-title"><Icon n="file" s={16}/> {mode === "create" ? "記事を作成" : "記事を編集"}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onCancel}><Icon n="x" s={14}/></button>
        </div>
        <div className="card-body stack" style={{gap:14}}>
          {error && <div style={{padding:10,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:6,color:'var(--red)',fontSize:12}}>{error}</div>}
          <div className="field">
            <label className="field-label">タイトル <span className="field-req">*</span></label>
            <input className="input input-lg" value={title} onChange={e=>setTitle(e.target.value)} placeholder="例: 春のIFT 募集開始のお知らせ"/>
          </div>
          <div className="grid-2" style={{gap:14}}>
            <div className="field">
              <label className="field-label">カテゴリ <span className="field-req">*</span></label>
              <div className="select-wrap">
                <select className="input select" value={category} onChange={e=>setCategory(e.target.value)}>
                  <option>お知らせ</option>
                  <option>特集</option>
                  <option>募集</option>
                  <option>報告</option>
                </select>
              </div>
            </div>
            <div className="field">
              <label className="field-label">ステータス</label>
              <div className="select-wrap">
                <select className="input select" value={status} onChange={e=>setStatus(e.target.value)}>
                  <option>下書き</option>
                  <option>公開中</option>
                  <option>予約</option>
                  <option>非公開</option>
                </select>
              </div>
            </div>
          </div>
          <div className="field">
            <label className="field-label">本文 <span className="field-req">*</span></label>
            <textarea className="input" style={{height:280,padding:12,resize:'vertical',fontSize:13,lineHeight:1.6}} value={body} onChange={e=>setBody(e.target.value)} placeholder="記事本文を入力..."/>
            <div className="field-hint">Markdown 記法に対応</div>
          </div>
        </div>
        <div style={{padding:14,borderTop:'1px solid var(--line)',display:'flex',justifyContent:'space-between',gap:8}}>
          <button className="btn btn-ghost" onClick={onCancel} disabled={saving}>キャンセル</button>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>handleSubmit('下書き')} disabled={saving}>
              {saving ? '保存中…' : '下書き保存'}
            </button>
            <button className="btn btn-indigo" onClick={()=>handleSubmit('公開中')} disabled={saving}>
              {saving ? '保存中…' : (mode === "create" ? '公開する' : '更新して公開')}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function PageNews(){
  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [filter, setFilter] = useState("all");
  const [query, setQuery] = useState("");
  const [modalMode, setModalMode] = useState(null);
  const [editingN, setEditingN] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      setLoading(true);
      setError(null);
      try {
        const data = await window.fetchData('listNews');
        if (!cancelled) setNews(Array.isArray(data) ? data : []);
      } catch (err) {
        if (!cancelled) setError(err.message || String(err));
      } finally {
        if (!cancelled) setLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  async function handleSave(fields) {
    if (modalMode === "create") {
      await window.postData('createNews', fields);
    } else if (modalMode === "edit" && editingN) {
      await window.postData('updateNews', { newsId: editingN.id, fields });
    }
    window.location.reload();
  }

  async function handleDelete(newsId) {
    const n = news.find(x => x.id === newsId);
    if (!n) return;
    if (!await window.confirmDialog({title:`「${n.title}」を非公開にしますか?`, body:'行は残り、ステータスが「非公開」に変わります。後で復元できます。', danger:true, confirmLabel:'非公開化'})) return;
    setNews(prev => prev.map(x => x.id === newsId ? {...x, status: '非公開'} : x));
    try {
      await window.postData('deleteNews', { newsId });
    } catch (err) {
      setNews(prev => prev.map(x => x.id === newsId ? {...x, status: n.status} : x));
      window.toast.error('非公開化に失敗しました: ' + err.message);
    }
  }

  // フィルタ
  const filtered = news.filter(n => {
    if (filter === "all") {
      // デフォルトは「非公開」(=削除済み相当) を除外
      if (n.status === "非公開") return false;
    } else if (filter === "公開中" && n.status !== "公開中") return false;
    else if (filter === "下書き" && n.status !== "下書き") return false;
    else if (filter === "予約" && n.status !== "予約") return false;
    else if (filter === "非公開" && n.status !== "非公開") return false;

    if (query) {
      const q = query.toLowerCase();
      return (n.title || '').toLowerCase().includes(q) || (n.body || '').toLowerCase().includes(q);
    }
    return true;
  });

  const tabs = [
    ["all",     "すべて",  news.filter(n => n.status !== "非公開").length],
    ["公開中",   "公開中",  news.filter(n => n.status === "公開中").length],
    ["下書き",   "下書き",  news.filter(n => n.status === "下書き").length],
    ["予約",     "予約",    news.filter(n => n.status === "予約").length],
    ["非公開",   "非公開",  news.filter(n => n.status === "非公開").length],
  ];

  // トップ記事 (PV順、公開中のみ)
  const topNews = news.filter(n => n.status === "公開中").sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 3);

  return (
    <div className="page" data-page="news">
      <div className="page-head">
        <div className="ph-left">
          <div className="ph-crumbs"><span>コミュニケーション</span><span className="sep">/</span><span style={{color:'var(--ink2)'}}>ニュース配信</span></div>
          <h1>ニュース <i>配信</i></h1>
          <div className="ph-sub">公式サイト・アプリ・SNSへ横断配信。記事の作成・編集・公開管理。</div>
        </div>
        <div className="ph-right">
          {window.canDo('news.create') && (
            <button className="btn btn-indigo" onClick={()=>{setEditingN(null); setModalMode("create");}}>
              <Icon n="plus" s={14}/> 記事を作成
            </button>
          )}
        </div>
      </div>

      {error && <div style={{padding:"10px 14px",marginBottom:14,background:'var(--red-50)',border:'1px solid var(--red-100)',borderRadius:8,color:'var(--red)',fontSize:12}}><b>読み込みエラー:</b> {error}</div>}

      <div className="grid-ab">
        <div className="card">
          <div className="card-head">
            <div className="row" style={{gap:4}}>
              {tabs.map(([k, l, c]) => (
                <span key={k} className={clsx("chip", filter===k && "on")} onClick={()=>setFilter(k)}>
                  {l}<span style={{opacity:.6,marginLeft:4}}>{c}</span>
                </span>
              ))}
            </div>

            <div className="empty" style={{padding:'60px 40px'}}>

              <div style={{fontFamily:'var(--serif)',fontSize:18,marginTop:6,color:'var(--ink2)'}}>
